<style>
/* 页面私有样式：这里负责左右对比布局，统一主题仍然由 theme.css 提供。 */
body { font-family: system-ui, sans-serif; margin: 16px; }
.top_nav { display: flex; gap: 8px; margin-bottom: 10px; }
.top_nav a { display: inline-block; padding: 6px 10px; border: 1px solid #d9d9d9; background: #f6f8fa; color: #0b5394; text-decoration: none; border-radius: 6px; font-weight: 600; }
.top_nav a:hover { background: #eaf2ff; }
.layout { display: grid; grid-template-columns: 360px minmax(0, 1fr) 300px; gap: 14px; align-items: start; }
#controls { border: 1px solid #ddd; background: #fafafa; padding: 10px; }
#right_sidebar { display: grid; gap: 10px; align-items: start; }
label { display: block; margin-bottom: 8px; }
select, input, button { width: 100%; box-sizing: border-box; padding: 6px; }
.viewer_row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.viewer_box { border: 1px solid #ddd; height: 720px; position: relative; }
.side_card { border: 1px solid #e5e5e5; background: #fff; padding: 8px; }
.side_title { font-weight: 700; margin-bottom: 6px; }
.summary_block { padding: 8px; border: 1px solid #e9ecef; border-radius: 8px; background: #fbfbfb; font-size: 12px; line-height: 1.5; }
.summary_block + .summary_block { margin-top: 8px; }
.summary_block.is_warn { background: #fff1f0; border-color: #f0c7c2; color: #9f2d20; }
.summary_block.is_good { background: #eef8f1; border-color: #c8e4d1; color: #215c39; }
.viewer_title { position: absolute; top: 6px; left: 8px; background: rgba(255,255,255,0.9); border: 1px solid #ddd; border-radius: 4px; padding: 2px 6px; font-size: 12px; z-index: 3; }
#viewer_left, #viewer_right { width: 100%; height: 100%; }
#status { margin-top: 10px; color: #333; }
.rank_panel { margin-top: 10px; border: 1px solid #e5e5e5; background: #fff; padding: 6px; max-height: 220px; overflow: auto; font-size: 12px; }
.rank_row { display: flex; justify-content: space-between; gap: 8px; padding: 4px 2px; border-bottom: 1px dashed #eee; cursor: pointer; }
.rank_row:hover { background: #f7f7f7; }
.rank_row.is_warn { background: #fff1f0; color: #9f2d20; }
.rank_row.is_warn:hover { background: #ffe1de; }
.rank_row.is_good { background: #eef8f1; color: #215c39; }
.filter_box { margin-top: 10px; border: 1px solid #e5e5e5; background: #fff; padding: 8px; }
.filter_title { font-weight: 700; margin-bottom: 6px; }
.threshold_row { display: grid; grid-template-columns: 1fr 110px; gap: 8px; align-items: end; }
.status_warn { color: #9f2d20; font-weight: 700; }
.rank_title { font-weight: 700; margin-bottom: 4px; }
.local_box { margin-top: 10px; border: 1px solid #e5e5e5; background: #fff; padding: 8px; }
.local_title { font-weight: 700; margin-bottom: 6px; }
.online_row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.progress_box { margin-top: 8px; border: 1px solid #e5e5e5; background: #fff; padding: 8px; }
.progress_head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.progress_track { width: 100%; height: 10px; border-radius: 999px; background: #eceff4; overflow: hidden; }
.progress_fill { width: 0%; height: 100%; background: linear-gradient(90deg, #4f8cc9, #67b99a); transition: width .25s ease; }
.viewer_notice { position: absolute; right: 8px; bottom: 8px; left: 8px; z-index: 4; display: none; padding: 8px 10px; border: 1px solid #d0d7de; border-radius: 6px; background: rgba(255,255,255,0.96); color: #333; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }

<script>
// 页面状态：同时管理左右两个 viewer、本地索引数据和在线任务状态。
let diffdockIndex = {items:[]};
let masterData = {items:[]};
let vLeft;
let vRight;
let residueLabelMode = false;
let measureMode = false;
const viewerStates = new Map();
const receptorInfoCache = new Map();
let autoApplyingTop2 = false;
let onlineJobId = "";
let onlineResult = {apiBase:"", receptor:null, poses:[]};
let onlineSubmission = {receptor:null, ligand:null};
let localApiBase = "";
let localDataViaApi = false;
let onlinePollTimer = null;
let currentOnlineProgress = 0;
let threeDmolLoader = null;
let poseDistanceCache = new Map();
const HIS_RESIDUES = new Set(["HIS", "HID", "HIE", "HIP", "HSD", "HSE", "HSP"]);
const PROTEIN_DISPLAY_RESIDUES = new Set([
  "ALA", "ARG", "ASN", "ASP", "ASH", "CYS", "CYM", "CYX", "GLN", "GLU", "GLH",
  "GLY", "HIS", "HID", "HIE", "HIP", "HSD", "HSE", "HSP", "ILE", "LEU", "LYS",
  "LYN", "MET", "MSE", "PHE", "PRO", "SEC", "SER", "THR", "TRP", "TYR", "VAL",
]);
const PROTEIN_DONOR_ATOMS = {
  ALA: new Set(),
  ARG: new Set(["NE", "NH1", "NH2"]),
  ASN: new Set(["OD1", "ND2"]),
  ASP: new Set(["OD1", "OD2"]),
  ASH: new Set(["OD1", "OD2"]),
  CYS: new Set(["SG"]),
  CYM: new Set(["SG"]),
  CYX: new Set(["SG"]),
  GLN: new Set(["OE1", "NE2"]),
  GLU: new Set(["OE1", "OE2"]),
  GLH: new Set(["OE1", "OE2"]),
  GLY: new Set(),
  HIS: new Set(["ND1", "NE2"]),
  HID: new Set(["ND1", "NE2"]),
  HIE: new Set(["ND1", "NE2"]),
  HIP: new Set(["ND1", "NE2"]),
  HSD: new Set(["ND1", "NE2"]),
  HSE: new Set(["ND1", "NE2"]),
  HSP: new Set(["ND1", "NE2"]),
  ILE: new Set(),
  LEU: new Set(),
  LYS: new Set(["NZ"]),
  LYN: new Set(["NZ"]),
  MET: new Set(["SD"]),
  MSE: new Set(["SE"]),
  PHE: new Set(),
  PRO: new Set(),
  SEC: new Set(["SE"]),
  SER: new Set(["OG"]),
  THR: new Set(["OG1"]),
  TRP: new Set(["NE1"]),
  TYR: new Set(["OH"]),
  VAL: new Set(),
};

// 3Dmol 没加载成功时，使用空实现兜底，这样数据部分仍可继续浏览。
function createViewerStub() {
  return {
    __viewerStub: true,
    clear(){},
    addModel(){ return { setStyle(){} }; },
    setStyle(){},
    zoomTo(){},
    render(){},
    setClickable(){},
    getModel(){ return { selectedAtoms(){ return []; } }; },
    addLabel(){ return null; },
    removeLabel(){},
    addLine(){ return null; },
    removeShape(){}
  };
}
function makeViewer(id) {
  try {
    if (window.$3Dmol) return $3Dmol.createViewer(id, {backgroundColor:"white"});
  } catch (_) {}
  return createViewerStub();
}
vLeft = createViewerStub();
vRight = createViewerStub();
function setStatus(t) {
  document.getElementById("status").textContent = t;
}
function setStatusWarn(on) {
  document.getElementById("status").classList.toggle("status_warn", Boolean(on));
}
function setSideSummary(side, payload) {
  const el = document.getElementById(side === "left" ? "summary_left" : "summary_right");
  if (!el) return;
  if (!payload) {
    el.className = "summary_block";
    el.textContent = side === "left" ? "左侧未加载" : "右侧未加载";
    return;
  }
  const lines = [];
  if (payload.title) lines.push(payload.title);
  if (payload.pose) lines.push(`Pose: ${payload.pose}`);
  if (payload.znSite) lines.push(`目标Zn: ${payload.znSite}`);
  if (payload.distanceText) lines.push(`最短距离: ${payload.distanceText}`);
  if (payload.note) lines.push(payload.note);
  el.className = "summary_block";
  if (payload.tone === "warn") el.classList.add("is_warn");
  if (payload.tone === "good") el.classList.add("is_good");
  el.innerHTML = lines.map((line) => `<div>${line}</div>`).join("");
}
function viewerUnavailableMessage() {
  return "3Dmol 未加载，通常是浏览器无法访问 3Dmol CDN；页面数据仍可浏览，但三维图像无法渲染。";
}
function setViewerNotice(side, text, tone = "normal") {
  const el = document.getElementById(side === "left" ? "viewer_notice_left" : "viewer_notice_right");
  if (!el) return;
  el.textContent = text || "";
  el.classList.toggle("error", tone === "error");
  el.style.display = text ? "block" : "none";
}
function clearViewerNotices() {
  setViewerNotice("left", "");
  setViewerNotice("right", "");
}
function getRiskThreshold() {
  const value = Number(document.getElementById("risk_threshold").value || 5);
  return Number.isFinite(value) && value > 0 ? value : 5;
}
function isThresholdFilterEnabled() {
  return Boolean(document.getElementById("threshold_filter_enabled").checked);
}
function poseDistanceKey(pid, poseFile, siteLabel) {
  return `${String(pid || "").trim().toUpperCase()}|${String(poseFile || "").trim()}|${String(siteLabel || "").trim().toUpperCase()}`;
}
function distanceTone(distance) {
  if (distance == null) return "";
  if (distance <= 3.5) return "good";
  if (distance > getRiskThreshold()) return "warn";
  return "";
}
function filterReceptorModelText(text, fmt) {
  if (String(fmt || "").toLowerCase() !== "pdb") return text;
  const out = [];
  for (const line of String(text || "").split(/\r?\n/)) {
    if (line.startsWith("ATOM")) {
      out.push(line);
      continue;
    }
    if (line.startsWith("HETATM")) {
      const resn = line.slice(17, 20).trim().toUpperCase();
      if (resn === "ZN" || PROTEIN_DISPLAY_RESIDUES.has(resn)) out.push(line);
      continue;
    }
    if (line.startsWith("CONECT")) continue;
    out.push(line);
  }
  return out.join("\n");
}

// ---------- 在线任务进度与轮询 ----------
function setOnlineProgress(value, label, tone = "normal") {
  const pct = Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
  currentOnlineProgress = pct;
  document.getElementById("online_progress_fill").style.width = pct + "%";
  document.getElementById("online_progress_fill").style.background =
    tone === "error"
      ? "linear-gradient(90deg, #d62828, #f77f00)"
      : "linear-gradient(90deg, #4f8cc9, #67b99a)";
  document.getElementById("online_progress_label").textContent = label || "在线任务进度";
  document.getElementById("online_progress_pct").textContent = pct + "%";
}
function resetOnlineProgress(label = "在线任务进度") {
  setOnlineProgress(0, label, "normal");
}
function diffdockProgressValue(job) {
  const phase = String(job?.phase || job?.status || "queued");
  const table = {
    queued: 6,
    starting: 12,
    prepare_dirs: 20,
    open_log: 28,
    validate_env: 35,
    spawn: 45,
    waiting: 72,
    collect_results: 90,
    done: 100,
    failed: Math.max(currentOnlineProgress, 100),
    failed_no_infer: Math.max(currentOnlineProgress, 100),
    failed_no_pose: Math.max(currentOnlineProgress, 100),
    failed_exception: Math.max(currentOnlineProgress, 100),
  };
  if (table[phase] != null) return table[phase];
  if (String(job?.status || "") === "done") return 100;
  if (String(job?.status || "") === "failed") return Math.max(currentOnlineProgress, 100);
  return Math.max(8, currentOnlineProgress);
}
function updateOnlineProgressFromJob(job) {
  const status = String(job?.status || "queued");
  const phase = String(job?.phase || status);
  const pct = diffdockProgressValue(job);
  const tone = status === "failed" ? "error" : "normal";
  const label = status === "done"
    ? `在线任务完成 (${phase})`
    : (status === "failed" ? `在线任务失败 (${phase})` : `在线任务进行中 (${phase})`);
  setOnlineProgress(pct, label, tone);
}
function stopOnlinePolling() {
  if (onlinePollTimer) {
    clearInterval(onlinePollTimer);
    onlinePollTimer = null;
  }
}
function scheduleOnlinePolling() {
  stopOnlinePolling();
  onlinePollTimer = setInterval(() => {
    if (!onlineJobId) {
      stopOnlinePolling();
      return;
    }
    pollOnlineJob({silent: true});
  }, 3000);
}

// ---------- 3Dmol 加载与 viewer 初始化 ----------
function loadExternalScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.async = true;
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("script load failed: " + url));
    document.head.appendChild(s);
  });
}
async function ensure3DmolLoaded() {
  if (window.$3Dmol) return true;
  if (!threeDmolLoader) {
    threeDmolLoader = (async () => {
      const urls = [
        "https://unpkg.com/3dmol/build/3Dmol-min.js",
        "https://cdn.jsdelivr.net/npm/3dmol/build/3Dmol-min.js",
      ];
      for (const url of urls) {
        try {
          await loadExternalScript(url);
          if (window.$3Dmol) return true;
        } catch (_) {}
      }
      return Boolean(window.$3Dmol);
    })();
  }
  return await threeDmolLoader;
}
async function ensureViewersReady() {
  const ok = await ensure3DmolLoaded();
  if (ok && vLeft.__viewerStub) {
    vLeft = makeViewer("viewer_left");
    vRight = makeViewer("viewer_right");
  }
  if (!ok) {
    const msg = viewerUnavailableMessage();
    setViewerNotice("left", msg, "error");
    setViewerNotice("right", msg, "error");
  }
  return ok;
}

// ---------- API 与数据路径解析 ----------
function getApiBase() {
  return (document.getElementById("api_base").value || "").trim().replace(/\/+$/, "");
}
function appendNoCache(url) {
  return url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
}
function buildApiCandidates() {
  const userBase = getApiBase();
  const h = window.location.hostname || "127.0.0.1";
  const originBase = window.location.origin && window.location.origin !== "null" ? window.location.origin : "";
  const cands = [];
  if (userBase) cands.push(userBase);
  if (originBase) cands.push(originBase);
  cands.push(`http://${h}:8015`, `http://${h}:8021`, `http://${h}:8019`, `http://${h}:8018`, `http://${h}:8017`, `http://${h}:8016`);
  cands.push("http://127.0.0.1:8015", "http://127.0.0.1:8021", "http://127.0.0.1:8019", "http://127.0.0.1:8018", "http://127.0.0.1:8017", "http://127.0.0.1:8016");
  return [...new Set(cands.filter(Boolean))];
}
async function detectApiBase() {
  if (localApiBase) return localApiBase;
  for (const b of buildApiCandidates()) {
    try {
      const j = await fetchJsonRaw(b + "/api/diffdock/ping");
      if (j && j.ok) {
        localApiBase = b;
        document.getElementById("api_base").value = b;
        return localApiBase;
      }
    } catch (_) {}
  }
  return "";
}
function normalizeDataRelPath(ref) {
  const s = String(ref || "").trim();
  if (!s) return "";
  const directPrefixes = ["../backend/data/", "./backend/data/", "/backend/data/", "backend/data/"];
  for (const p of directPrefixes) {
    if (s.startsWith(p)) return s.slice(p.length);
  }
  if (s.startsWith("structures/") || s.startsWith("diffdock/") || s.startsWith("ligands/") || s.startsWith("pockets/")) return s;
  if (s === "data.json" || s === "diffdock_index.json" || s === "master_full.json") return s;
  if (s.startsWith("/root/PDB_ZN/diffdock_inputs/receptors/")) {
    return "structures/" + s.split("/").pop();
  }
  if (s.startsWith("/root/PDB_ZN/diffdock_outputs/")) {
    const parts = s.split("/").filter(Boolean);
    const fname = parts[parts.length - 1] || "";
    const pid = parts[parts.length - 2] || "";
    if (pid && fname) return `diffdock/${pid}/${fname}`;
  }
  return "";
}
function resolveDataUrl(ref) {
  const rel = normalizeDataRelPath(ref);
  if (!rel) return String(ref || "").trim();
  if (localApiBase && localDataViaApi) {
    return `${localApiBase}/api/data/file?path=${encodeURIComponent(rel)}`;
  }
  return `../backend/data/${rel}`;
}
function resolveDataUrlCandidates(ref) {
  const rel = normalizeDataRelPath(ref);
  if (!rel) {
    const raw = String(ref || "").trim();
    return raw ? [raw] : [];
  }
  const out = [];
  if (localApiBase) out.push(`${localApiBase}/api/data/file?path=${encodeURIComponent(rel)}`);
  out.push(`../backend/data/${rel}`);
  return [...new Set(out)];
}
function dataUrlCandidates(relPath) {
  const out = [];

function deriveMasterId(row) {

  if (rep) return rep;
  const receptor = String(row?.Receptor_PDB || "").trim();
  if (!receptor) return "";
  return receptor.split("/").pop().split(".")[0].trim().toUpperCase();
}
function deriveReceptorRelPath(row, id) {

  const ext = receptor.toLowerCase().endsWith(".cif") ? ".cif" : ".pdb";
  const rep = String(id || deriveMasterId(row)).trim().toUpperCase();
  return rep ? `../backend/data/structures/${rep}${ext}` : "";

function normalizeMasterRow(row) {

    cluster: row?.Cluster_ID || "",

function normalizeMasterPayload(payload) {
  if (Array.isArray(payload?.items)) {
    return {items: payload.items.map((item) => ({

      id: String(item?.id || "").trim().toUpperCase(),
      zn_coord_site: item?.zn_coord_site || item?.step5_zn_site || "",
    }))};
  }
  if (Array.isArray(payload?.rows)) {
    return {items: payload.rows.map(normalizeMasterRow).filter((item) => item.id)};
  }
  return {items: []};
}

function setOnlineInfo(t) {

function readFileText(file) {
  return new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ""));
    fr.onerror = () => reject(new Error("文件读取失败: " + (file && file.name ? file.name : "")));
    fr.readAsText(file);
  });
}
function dist3(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}
function parsePdbAtoms(text) {
  const out = [];
  const lines = (text || "").split(/\r?\n/);
  for (const line of lines) {
    if (!(line.startsWith("ATOM") || line.startsWith("HETATM"))) continue;
    const atom = line.slice(12,16).trim();
    const resn = line.slice(17,20).trim();
    const chain = line.slice(21,22).trim();
    const resiStr = line.slice(22,26).trim();
    const icode = line.slice(26,27).trim();
    const x = Number(line.slice(30,38).trim());
    const y = Number(line.slice(38,46).trim());
    const z = Number(line.slice(46,54).trim());
    const elemRaw = line.length >= 78 ? line.slice(76,78).trim() : "";
    const elem = (elemRaw || atom.replace(/[0-9]/g, "").slice(0,2)).toUpperCase();
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({atom, resn: resn.toUpperCase(), chain, resi: `${resiStr}${icode}`.trim(), x, y, z, elem});
  }
  return out;
}
function parseSdfAtoms(text) {
  const lines = (text || "").split(/\r?\n/);
  if (lines.length < 4) return [];
  const nAtoms = parseInt((lines[3] || "").slice(0,3).trim(), 10);
  if (!Number.isFinite(nAtoms) || nAtoms <= 0) return [];
  const atoms = [];
  for (let i = 4; i < 4 + nAtoms && i < lines.length; i++) {
    const line = lines[i];
    const x = Number(line.slice(0,10).trim());
    const y = Number(line.slice(10,20).trim());
    const z = Number(line.slice(20,30).trim());
    const elem = line.slice(31,34).trim().toUpperCase();
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    atoms.push({x, y, z, elem});
  }
  return atoms;
}
async function fetchText(ref) {
  const urls = Array.isArray(ref) ? ref : resolveDataUrlCandidates(ref);
  let lastErr = null;
  for (const url of urls) {
    try {
      const r = await fetch(appendNoCache(url));
      if (!r.ok) throw new Error(url + ` -> http_${r.status}`);
      return await r.text();
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("加载失败");
}
function donorAtomAllowed(atom) {
  const allowed = PROTEIN_DONOR_ATOMS[String(atom?.resn || "").toUpperCase()];
  return Boolean(allowed && allowed.has(String(atom?.atom || "").toUpperCase()));
}
function normalizeSiteLabel(text) {
  return String(text || "").trim().toUpperCase();
}
function residueLabel(atom) {
  return `${String(atom?.resn || "").toUpperCase()}:${atom?.chain || "?"}:${atom?.resi || "?"}`;
}
function coordSiteSortValue(site) {
  return [
    -Number(site?.hisCount || 0),
    Number(site?.nonHisCount || 1e9),
    Number(site?.residueCount || 1e9),
    Number(site?.distSum || 9999),
    String(site?.site || ""),
    Number(site?.index || 1e9),
  ];
}
function compareCoordSite(a, b) {
  const av = coordSiteSortValue(a);
  const bv = coordSiteSortValue(b);
  for (let i = 0; i < av.length; i++) {
    if (av[i] < bv[i]) return -1;
    if (av[i] > bv[i]) return 1;
  }
  return 0;
}
function compareQualifiedCoordSite(a, b) {
  const av = [
    Number(a?.nonHisCount || 1e9),
    -Number(a?.hisCount || 0),
    Number(a?.residueCount || 1e9),
    Number(a?.distSum || 9999),
    String(a?.site || ""),
    Number(a?.index || 1e9),
  ];
  const bv = [
    Number(b?.nonHisCount || 1e9),
    -Number(b?.hisCount || 0),
    Number(b?.residueCount || 1e9),
    Number(b?.distSum || 9999),
    String(b?.site || ""),
    Number(b?.index || 1e9),
  ];
  for (let i = 0; i < av.length; i++) {
    if (av[i] < bv[i]) return -1;
    if (av[i] > bv[i]) return 1;
  }
  return 0;
}
function collectCoordSites(atoms) {
  const znAtoms = atoms.filter(a => a.elem === "ZN" || String(a.atom || "").toUpperCase() === "ZN");
  const donorAtoms = atoms.filter(donorAtomAllowed);
  const sites = [];
  let idx = 1;
  for (const zn of znAtoms) {
    const nearest = new Map();
    for (const atom of donorAtoms) {
      const d = dist3(zn, atom);
      if (d > 3.2) continue;
      const key = `${atom.chain || ""}|${atom.resi || ""}|${atom.resn || ""}`;
      const old = nearest.get(key);
      if (!old || d < old.distance) nearest.set(key, {atom, distance: d});
    }
    const nearestItems = Array.from(nearest.values());
    const hisCount = nearestItems.filter((item) => HIS_RESIDUES.has(String(item.atom?.resn || "").toUpperCase())).length;
    const residueCount = nearestItems.length;
    const nonHisCount = Math.max(0, residueCount - hisCount);
    const distSum = nearestItems.length
      ? nearestItems.map((item) => item.distance).sort((a, b) => a - b).slice(0, 3).reduce((sum, value) => sum + value, 0)
      : 9999;
    sites.push({
      index: idx++,
      zn,
      hisCount,
      residueCount,
      nonHisCount,
      distSum,
      site: `${zn.chain || "?"}:${zn.resi || "?"}`,
      residuesText: nearestItems
        .sort((a, b) => a.distance - b.distance || residueLabel(a.atom).localeCompare(residueLabel(b.atom), "zh-Hans-CN", {numeric:true, sensitivity:"base"}))
        .map((item) => `${residueLabel(item.atom)}:${item.distance.toFixed(3)}`)
        .join("; "),
    });
  }
  return sites.sort(compareCoordSite);
}
function findHisCoordinatedZn(atoms, preferredSite) {
  const sites = collectCoordSites(atoms);
  if (!sites.length) return null;
  const siteLabel = normalizeSiteLabel(preferredSite);
  if (siteLabel) {
    const matched = sites.find((site) => normalizeSiteLabel(site.site) === siteLabel);
    if (matched) return matched;
  }
  if (sites.length > 1) {
    const qualified = sites.filter((site) => Number(site.hisCount || 0) >= 3).sort(compareQualifiedCoordSite);
    if (qualified.length) return qualified[0];
  }
  return sites[0];
}
function znFocusSelectionFromInfo(info) {
  const zn = info && info.znInfo ? info.znInfo.zn : null;
  if (!zn) return {within:{distance:5.0, sel:{elem:"ZN"}}, byres:true};
  if (zn.chain || zn.resi) {
    return {within:{distance:5.0, sel:{chain: zn.chain, resi: zn.resi}}, byres:true};
  }
  return {within:{distance:5.0, sel:{elem:"ZN"}}, byres:true};
}
async function getReceptorInfo(pid) {
  if (receptorInfoCache.has(pid)) return receptorInfoCache.get(pid);
  const master = getMasterItem(pid) || {};
  const cands = structureCandidates(pid);
  let text = "";
  let used = "";
  for (const c of cands) {
    if (c.toLowerCase().endsWith(".cif")) continue;
    try {
      text = await fetchText(c);
      used = c;
      break;
    } catch (_) {}
  }
  const atoms = parsePdbAtoms(text);
  const znInfo = findHisCoordinatedZn(atoms, master.zn_coord_site);
  const info = {atoms, znInfo, source: used};
  receptorInfoCache.set(pid, info);
  return info;
}
async function computeZnDistanceRanking(pid, topN) {
  const poses = getAvailablePoses(pid).filter((p) => p.rank != null);
  if (!poses.length) return [];
  const receptor = await getReceptorInfo(pid);
  const zn = receptor && receptor.znInfo ? receptor.znInfo.zn : null;
  const siteLabel = receptor && receptor.znInfo ? receptor.znInfo.site : "";
  const rows = [];
  for (const p of poses) {
    const cacheKey = poseDistanceKey(pid, p.file, siteLabel);
    let d = poseDistanceCache.get(cacheKey);
    if (d === undefined) {
      d = Number.POSITIVE_INFINITY;
      try {
        const sdf = await fetchText(p.file);
        const ligAtoms = parseSdfAtoms(sdf).filter(a => a.elem !== "H");
        if (zn && ligAtoms.length) {
          for (const a of ligAtoms) {
            const dd = dist3(a, zn);
            if (dd < d) d = dd;
          }
        }
      } catch (_) {}
      d = Number.isFinite(d) ? d : null;
      poseDistanceCache.set(cacheKey, d);
    }
    rows.push({...p, zn_distance: Number.isFinite(d) ? d : null, his_count: receptor && receptor.znInfo ? receptor.znInfo.hisCount : 0});
  }
  rows.sort((a,b)=>{
    const da = a.zn_distance == null ? Number.POSITIVE_INFINITY : a.zn_distance;
    const db = b.zn_distance == null ? Number.POSITIVE_INFINITY : b.zn_distance;
    if (da !== db) return da - db;
    const ar = a.rank == null ? Number.POSITIVE_INFINITY : a.rank;
    const br = b.rank == null ? Number.POSITIVE_INFINITY : b.rank;
    return ar - br;
  });
  if (isThresholdFilterEnabled()) {
    const thr = getRiskThreshold();
    const filtered = rows.filter((row) => row.zn_distance != null && row.zn_distance <= thr);
    if (filtered.length) return filtered.slice(0, topN);
  }
  return rows.slice(0, topN);
}
async function computePoseZnDistance(pid, poseFile, receptorInfo) {
  const info = receptorInfo || await getReceptorInfo(pid);
  const zn = info && info.znInfo ? info.znInfo.zn : null;
  if (!zn || !poseFile) return null;
  const cacheKey = poseDistanceKey(pid, poseFile, info && info.znInfo ? info.znInfo.site : "");
  if (poseDistanceCache.has(cacheKey)) return poseDistanceCache.get(cacheKey);
  try {
    const sdf = await fetchText(poseFile);
    const ligAtoms = parseSdfAtoms(sdf).filter((a) => a.elem !== "H");
    if (!ligAtoms.length) return null;
    let best = null;
    for (const atom of ligAtoms) {
      const d = dist3(atom, zn);
      if (best == null || d < best) best = d;
    }
    poseDistanceCache.set(cacheKey, best);
    return best;
  } catch (_) {
    return null;
  }
}

// ---------- viewer 交互：标签、测量和点击高亮 ----------
function renderRankList(side, rows) {
  const box = document.getElementById(side === "left" ? "left_rank_list" : "right_rank_list");
  box.innerHTML = "";
  if (!rows.length) {
    box.textContent = "无可用排序数据";
    return;
  }
  for (const r of rows) {
    const div = document.createElement("div");
    div.className = "rank_row";
    const tone = distanceTone(r.zn_distance);
    if (tone === "warn") div.classList.add("is_warn");
    if (tone === "good") div.classList.add("is_good");
    const d = r.zn_distance == null ? "NA" : r.zn_distance.toFixed(2) + " Å";
    const riskText = tone === "warn" ? " 高风险" : (tone === "good" ? " 较可信" : "");
    div.innerHTML = `<span>rank${r.rank}${riskText}</span><span>${d}</span>`;
    div.title = `confidence: ${r.confidence ?? "NA"}, HIS数: ${r.his_count}`;
    div.addEventListener("click", ()=>{
      const poseSel = document.getElementById(side === "left" ? "pose_left" : "pose_right");
      poseSel.value = r.file;
      loadCompare();
    });
    box.appendChild(div);
  }
}
async function refreshRankForSide(side) {
  const pid = document.getElementById(side === "left" ? "pdb_left" : "pdb_right").value;
  if (!pid) {

  }
  const rows = await computeZnDistanceRanking(pid, 10);

async function applyAutoTop2FromLeft() {

    if (!leftPid) return;

    const leftPoseSel = document.getElementById("pose_left");
    const rightPoseSel = document.getElementById("pose_right");

    leftPoseSel.value = rows[0].file;
    rightPoseSel.value = rows.length > 1 ? rows[1].file : rows[0].file;
    await refreshRankForSide("right");
    loadCompare();
  } finally {
    autoApplyingTop2 = false;
  }
}
function getViewerState(viewer) {

function atomName(a) {
  return `${a.chain || ""}:${a.resn || ""}${a.resi || ""}:${a.atom || a.elem || ""}`;
}
function offsetLabelPos(a, ref) {
  const r = ref || {x:a.x, y:a.y - 1, z:a.z};
  let vx = a.x - r.x;
  let vy = a.y - r.y;
  let vz = a.z - r.z;
  const n = Math.sqrt(vx*vx + vy*vy + vz*vz);
  if (n < 1e-6) {
    vx = 0;
    vy = 1;
    vz = 0;
  } else {
    vx /= n;
    vy /= n;
    vz /= n;
  }
  return {x:a.x + vx * 1.0, y:a.y + vy * 1.0, z:a.z + vz * 1.0};
}
function clearMeasurementForViewer(viewer, state) {
  if (viewer.removeShape) {
    for (const s of state.measureShapes) viewer.removeShape(s);
  }
  state.measureShapes = [];
  if (viewer.removeLabel) {
    for (const l of state.measureLabels) viewer.removeLabel(l);
  }
  state.measureLabels = [];
  state.measurePoints = [];
}
function handleMeasureClick(viewer, state, atom, sideText) {
  state.measurePoints.push(atom);
  if (state.measurePoints.length === 2) {
    const a = state.measurePoints[0];
    const b = state.measurePoints[1];
    const d = dist3(a, b);
    if (viewer.addLine) {
      state.measureShapes.push(viewer.addLine({start:{x:a.x,y:a.y,z:a.z}, end:{x:b.x,y:b.y,z:b.z}, color:"red", linewidth:3}));
    }
    if (viewer.addLabel) {
      state.measureLabels.push(viewer.addLabel(`d=${d.toFixed(2)} Å`, {
        position:{x:(a.x+b.x)/2, y:(a.y+b.y)/2, z:(a.z+b.z)/2},
        backgroundColor:"red",
        fontColor:"white",
        inFront:true
      }));
    }
    setStatus(`${sideText}键长：${atomName(a)} ↔ ${atomName(b)} = ${d.toFixed(2)} Å`);
  } else if (state.measurePoints.length === 3) {
    const a = state.measurePoints[0];
    const b = state.measurePoints[1];
    const c = state.measurePoints[2];
    const v1 = {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z};
    const v2 = {x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
    const n1 = Math.sqrt(v1.x*v1.x+v1.y*v1.y+v1.z*v1.z);
    const n2 = Math.sqrt(v2.x*v2.x+v2.y*v2.y+v2.z*v2.z);
    const cosv = (v1.x*v2.x+v1.y*v2.y+v1.z*v2.z) / Math.max(1e-8, n1*n2);
    const ang = Math.acos(Math.max(-1, Math.min(1, cosv))) * 180 / Math.PI;
    if (viewer.addLine) {
      state.measureShapes.push(viewer.addLine({start:{x:b.x,y:b.y,z:b.z}, end:{x:a.x,y:a.y,z:a.z}, color:"purple", linewidth:3}));
      state.measureShapes.push(viewer.addLine({start:{x:b.x,y:b.y,z:b.z}, end:{x:c.x,y:c.y,z:c.z}, color:"purple", linewidth:3}));
    }
    if (viewer.addLabel) {
      state.measureLabels.push(viewer.addLabel(`∠=${ang.toFixed(1)}°`, {
        position:{x:b.x,y:b.y,z:b.z},
        backgroundColor:"purple",
        fontColor:"white",
        inFront:true
      }));
    }
    setStatus(`${sideText}键角：${atomName(a)} - ${atomName(b)} - ${atomName(c)} = ${ang.toFixed(1)}°`);
    state.measurePoints = [];
  } else {
    setStatus(`${sideText}测量点1：${atomName(atom)}，请继续点击第2个原子`);
  }
  viewer.render();
}

function labelResiduesInSelection(viewer, state, sel) {

  if (viewer.removeLabel) {
    for (const lb of state.nearLabels) viewer.removeLabel(lb);
  }
  state.nearLabels = [];
  const model = viewer.getModel();
  if (!model || !model.selectedAtoms) return;
  const coreSel = sel && sel.within ? {within: sel.within} : sel;
  const atoms = model.selectedAtoms(coreSel) || [];
  const resMap = new Map();
  for (const a of atoms) {
    if (!a) continue;
    const key = `${a.chain || ""}:${a.resn || ""}${a.resi || ""}`;
    const prev = resMap.get(key);
    if (!prev || a.atom === "CA") resMap.set(key, a);
  }
  for (const a of resMap.values()) {
    const lb = viewer.addLabel(`${a.chain || ""}:${a.resn || ""}${a.resi || ""}`, {
      position: offsetLabelPos(a),
      backgroundColor: "rgba(255,255,255,0.92)",
      fontColor: "black",
      fontSize: 15,
      inFront: true
    });
    state.nearLabels.push(lb);
  }
}
function bindViewerClick(viewer) {
  const state = getViewerState(viewer);
  if (!viewer.setClickable) return;
  viewer.setClickable({}, true, function(atom) {
    if (!atom) return;
    const sideText = viewer === vLeft ? "左侧" : "右侧";
    if (measureMode) {
      handleMeasureClick(viewer, state, atom, sideText);
      return;
    }
    applyPanelBase(viewer, state);
    const isZn = (atom.elem || "").toUpperCase() === "ZN" || (atom.atom || "").toUpperCase() === "ZN";
    const nearSel = isZn
      ? {within:{distance:5.0, sel:(atom.serial != null ? {serial:atom.serial} : {elem:"ZN"})}, byres:true}
      : {within:{distance:5.0, sel:{chain: atom.chain, resi: atom.resi}}, byres:true};
    viewer.setStyle(nearSel, {stick:{colorscheme:"whiteCarbon", radius:0.18}});
    if (!isZn) viewer.setStyle({chain: atom.chain, resi: atom.resi}, {stick:{color:"orange", radius:0.22}});
    viewer.setStyle({elem:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
    viewer.setStyle({atom:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
    clearViewerLabels(viewer, state);
    labelResiduesInSelection(viewer, state, nearSel);
    state.lastSel = nearSel;
    if (viewer.addLabel) {
      const pickedText = isZn ? "ZN" : `${atom.chain || ""}:${atom.resn || ""}${atom.resi || ""}`;
      state.pickedLabel = viewer.addLabel(pickedText, {
        position: {x:atom.x, y:atom.y, z:atom.z},
        backgroundColor: "black",
        fontColor: "white",
        fontSize: 15,
        inFront: true
      });
    }
    viewer.zoomTo(nearSel);
    viewer.render();
    setStatus(isZn ? "已定位 ZN 的5Å邻域" : `已定位 ${atom.chain || ""}:${atom.resn || ""}${atom.resi || ""} 的5Å邻域`);
  });
}

async function initData() {

function getEntryById(id) {
  return (diffdockIndex.items || []).find(x => (x.id || "").toUpperCase() === (id || "").toUpperCase());
}
function getMasterItem(id) {
  return (masterData.items || []).find(x => (x.id || "").toUpperCase() === (id || "").toUpperCase());
}
function parsePoseFilenameMeta(filename) {
  const name = String(filename || "").trim();
  const rankMatch = name.match(/rank(\d+)/i);
  const confMatch = name.match(/confidence-([-+]?[0-9]*\.?[0-9]+)/i);
  return {
    rank: rankMatch ? Number(rankMatch[1]) : null,
    confidence: confMatch ? Number(confMatch[1]) : null,
  };
}
function buildMasterBestPose(pid) {
  const master = getMasterItem(pid) || {};
  const bestSdf = String(master.best_sdf || "").trim();
  const rel = normalizeDataRelPath(bestSdf);
  if (!rel) return null;
  const filename = rel.split("/").pop() || "";
  const meta = parsePoseFilenameMeta(filename);
  return {
    file: rel,
    filename,
    rank: meta.rank,
    confidence: meta.confidence,
    isMasterBest: true,
  };
}
function getAvailablePoses(pid) {
  const entry = getEntryById(pid);
  const poses = [];
  const seen = new Set();
  for (const pose of (entry && entry.poses ? entry.poses : [])) {
    const normalized = {
      ...pose,
      file: normalizeDataRelPath(pose.file || ""),
      isMasterBest: false,
    };
    if (!normalized.file || seen.has(normalized.file)) continue;
    seen.add(normalized.file);
    poses.push(normalized);
  }
  const masterBest = buildMasterBestPose(pid);
  if (masterBest && !seen.has(masterBest.file)) {
    poses.push(masterBest);
  } else if (masterBest) {
    for (const pose of poses) {
      if (pose.file === masterBest.file) pose.isMasterBest = true;
    }
  }
  return poses.sort((a, b) => {
    const ar = a.rank == null ? Number.POSITIVE_INFINITY : a.rank;
    const br = b.rank == null ? Number.POSITIVE_INFINITY : b.rank;
    if (ar !== br) return ar - br;
    const ac = a.confidence == null ? Number.NEGATIVE_INFINITY : a.confidence;
    const bc = b.confidence == null ? Number.NEGATIVE_INFINITY : b.confidence;
    if (ac !== bc) return bc - ac;
    return String(a.filename || "").localeCompare(String(b.filename || ""), "zh-Hans-CN", {numeric:true, sensitivity:"base"});
  });
}
function renderPdbOptions() {
  const q = document.getElementById("search_pdb").value.trim().toUpperCase();
  const arr = (diffdockIndex.items || []).filter(x => !q || (x.id || "").toUpperCase().includes(q));
  const leftSel = document.getElementById("pdb_left");
  const rightSel = document.getElementById("pdb_right");
  const currentLeft = leftSel.value;
  const currentRight = rightSel.value;
  leftSel.innerHTML = "";
  rightSel.innerHTML = "";
  for (const sel of [leftSel, rightSel]) {
    for (const it of arr) {
      const op = document.createElement("option");
      op.value = it.id;
      op.textContent = `${it.id} (${it.pose_count})`;
      sel.appendChild(op);
    }
  }
  if (!arr.length) {
    for (const sel of [leftSel, rightSel]) {
      const op = document.createElement("option");
      op.value = "";
      op.textContent = "无匹配PDB";
      sel.appendChild(op);
    }
  } else {
    if (arr.find(x => x.id === currentLeft)) leftSel.value = currentLeft;
    if (arr.find(x => x.id === currentRight)) rightSel.value = currentRight;
    if (!leftSel.value && arr.length) leftSel.value = arr[0].id;
    if (!rightSel.value && arr.length > 1) rightSel.value = arr[1].id;
    if (!rightSel.value && arr.length) rightSel.value = arr[0].id;
  }
  await renderPoseOptions("left");
  await renderPoseOptions("right");
  await refreshRankForSide("left");
  await refreshRankForSide("right");
}
function poseLabel(p) {
  const r = p.rank != null ? `rank${p.rank}` : "rank?";
  const c = p.confidence != null ? `conf ${p.confidence}` : "conf ?";
  return p && p.isMasterBest ? `${r} | ${c} | 当前表Best` : `${r} | ${c}`;
}
async function getPoseDistancesMap(pid) {
  const rows = await computeZnDistanceRanking(pid, 1000);
  const out = new Map();
  for (const row of rows) out.set(row.file, row.zn_distance);
  return out;
}
function getDefaultPoseFile(pid) {
  const poses = getAvailablePoses(pid);
  const m = getMasterItem(pid) || {};
  const best = (m.best_sdf || "").split("/").pop();
  if (best) {
    const hit = poses.find(p => (p.filename || "") === best);
    if (hit) return hit.file;
  }
  return poses.length ? poses[0].file : "";
}
async function renderPoseOptions(side) {
  const pid = document.getElementById(side === "left" ? "pdb_left" : "pdb_right").value;
  const poseSel = document.getElementById(side === "left" ? "pose_left" : "pose_right");
  const current = poseSel.value;
  poseSel.innerHTML = "";
  const poses = getAvailablePoses(pid);
  const distMap = pid ? await getPoseDistancesMap(pid) : new Map();
  const threshold = getRiskThreshold();
  const preferred = isThresholdFilterEnabled()
    ? poses.filter((pose) => {
        const d = distMap.get(pose.file);
        return d != null && d <= threshold;
      })
    : poses;
  const toRender = preferred.length ? preferred : poses;
  for (const p of toRender) {
    const op = document.createElement("option");
    op.value = p.file;
    const d = distMap.get(p.file);
    const tone = distanceTone(d);
    const riskText = tone === "warn" ? " | 高风险" : (tone === "good" ? " | 较可信" : "");
    op.textContent = `${poseLabel(p)}${d == null ? "" : ` | ${d.toFixed(2)}Å`}${riskText}`;
    if (tone === "warn") op.style.color = "#9f2d20";
    if (tone === "good") op.style.color = "#215c39";
    poseSel.appendChild(op);
  }
  if (toRender.find(p => p.file === current)) {
    poseSel.value = current;
  } else {
    const def = toRender.length ? toRender[0].file : getDefaultPoseFile(pid);
    if (def) poseSel.value = def;
  }
}

function structureCandidates(id) {
  const m = getMasterItem(id) || {};
  const cands = [];
  for (const ref of [m.receptor_rel, m.receptor_pdb, `structures/${id}.pdb`, `structures/${id}.cif`]) {
    cands.push(...resolveDataUrlCandidates(ref));
  }
  return [...new Set(cands.filter(Boolean))];
}
async function tryLoadModel(viewer, candidates, fmts, transformText) {
  const errors = [];
  for (let i = 0; i < candidates.length; i++) {
    const u = candidates[i];
    try {
      const r = await fetch(u + "?t=" + Date.now());
      if (!r.ok) {
        errors.push(`${u} -> http_${r.status}`);
        continue;
      }
      const txtRaw = await r.text();
      const txt = typeof transformText === "function" ? transformText(txtRaw, fmts[i]) : txtRaw;
      viewer.addModel(txt, fmts[i]);
      return {url: u, errors};
    } catch (e) {
      errors.push(`${u} -> ${(e && e.message) || "load_failed"}`);
    }
  }
  return {url: "", errors};
}

async function submitOnlineJob() {
  const apiBase = getApiBase();
  if (!apiBase) {
    setStatus("请填写API地址");
    return;
  }
  const receptorFile = (document.getElementById("online_receptor_file").files || [])[0];
  const ligandFile = (document.getElementById("online_ligand_file").files || [])[0];
  if (!receptorFile || !ligandFile) {
    setStatus("请上传受体和配体文件");
    return;
  }
  const receptorText = await readFileText(receptorFile);
  const ligandText = await readFileText(ligandFile);
  const payload = {
    receptor_name: receptorFile.name,
    receptor_text: receptorText,
    ligand_name: ligandFile.name,
    ligand_text: ligandText,
    inference_steps: Number(document.getElementById("online_steps").value || 20),
    samples_per_complex: Number(document.getElementById("online_samples").value || 10)
  };
  onlineSubmission = {
    receptor: {
      name: receptorFile.name,
      text: receptorText,
      fmt: receptorFile.name.toLowerCase().endsWith(".cif") ? "cif" : "pdb",
    },
    ligand: {
      name: ligandFile.name,
      text: ligandText,
    }
  };
  onlineResult = {apiBase:"", receptor:null, poses:[]};
  renderOnlinePoses();
  resetOnlineProgress("在线任务排队中");
  setOnlineProgress(6, "在线任务排队中");
  setStatus("正在提交在线DiffDock任务...");
  try {
    const r = await fetch(apiBase + "/api/diffdock/submit", {
      method:"POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(payload)
    });
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || "submit failed");
    onlineJobId = j.job_id;
    setOnlineInfo(`任务已提交：${onlineJobId}`);
    setStatus(`在线任务已提交：${onlineJobId}`);
    scheduleOnlinePolling();
  } catch (e) {
    stopOnlinePolling();
    setOnlineProgress(100, "在线提交失败", "error");
    setStatus("在线提交失败：" + (e && e.message ? e.message : "unknown"));
  }
}
async function pollOnlineJob(opts = {}) {
  const apiBase = getApiBase();
  if (!apiBase || !onlineJobId) {
    setStatus("请先提交在线任务");
    return;
  }
  try {
    const r = await fetch(apiBase + "/api/diffdock/status/" + encodeURIComponent(onlineJobId));
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || "status failed");
    const job = j.job || {};
    updateOnlineProgressFromJob(job);
    setOnlineInfo(`任务 ${job.id}：${job.status}${job.error ? " | " + job.error : ""}`);
    if (job.status === "done" && Array.isArray(job.poses) && job.poses.length) {
      stopOnlinePolling();
      const cachedReceptor = onlineSubmission && onlineSubmission.receptor ? onlineSubmission.receptor : null;
      if (!cachedReceptor || !cachedReceptor.text) throw new Error("缺少受体文件");
      onlineResult = {
        apiBase,
        receptor: cachedReceptor,
        poses: job.poses
      };
      renderOnlinePoses();
      setStatus(`在线任务完成，pose数量 ${job.poses.length}`);
      setOnlineProgress(100, "在线任务完成");
    } else if (job.status === "failed") {
      stopOnlinePolling();
      setOnlineProgress(100, `在线任务失败 (${job.phase || job.status})`, "error");
      setStatus(`在线任务失败：${job.error || job.status || "unknown"}`);
    } else {
      if (!opts.silent) setStatus(`在线任务状态：${job.status}${job.phase ? " / " + job.phase : ""}`);
    }
  } catch (e) {
    if (!opts.silent) setOnlineProgress(100, "在线状态查询失败", "error");
    setStatus("查询在线任务失败：" + (e && e.message ? e.message : "unknown"));
  }
}

async function loadCompare() {
  const leftPid = document.getElementById("pdb_left").value;
  const rightPid = document.getElementById("pdb_right").value;
  const leftPose = document.getElementById("pose_left").value;
  const rightPose = document.getElementById("pose_right").value;
  if (!leftPid || !rightPid || !leftPose || !rightPose) {
    setStatus("请选择左右PDB和左右pose");
    return;
  }
  setStatus("正在加载对比...");
  try {
    const viewerReady = await ensureViewersReady();
    if (!viewerReady) {
      setStatus(viewerUnavailableMessage());
      return;
    }
    clearViewerNotices();
    await loadOne(vLeft, leftPid, leftPose, "orangeCarbon");
    await loadOne(vRight, rightPid, rightPose, "cyanCarbon");
    const leftMeta = getPoseMeta(leftPid, leftPose);
    const rightMeta = getPoseMeta(rightPid, rightPose);
    const leftInfo = await getReceptorInfo(leftPid);
    const rightInfo = await getReceptorInfo(rightPid);
    const [leftPoseDist, rightPoseDist] = await Promise.all([
      computePoseZnDistance(leftPid, leftPose, leftInfo),
      computePoseZnDistance(rightPid, rightPose, rightInfo),
    ]);
    document.getElementById("left_title").textContent = `左侧：${leftPid} | ${(leftMeta && leftMeta.filename) || leftPose.split('/').pop().split('?')[0]}`;
    document.getElementById("right_title").textContent = `右侧：${rightPid} | ${(rightMeta && rightMeta.filename) || rightPose.split('/').pop().split('?')[0]}`;
    const leftZnSite = leftInfo && leftInfo.znInfo ? (leftInfo.znInfo.site || `${leftInfo.znInfo.zn?.chain || "?"}:${leftInfo.znInfo.zn?.resi || "?"}`) : "";
    const rightZnSite = rightInfo && rightInfo.znInfo ? (rightInfo.znInfo.site || `${rightInfo.znInfo.zn?.chain || "?"}:${rightInfo.znInfo.zn?.resi || "?"}`) : "";
    const leftZn = leftInfo && leftInfo.znInfo && leftInfo.znInfo.zn
      ? `${leftPid} 目标Zn ${leftZnSite} | 当前pose最短距离 ${leftPoseDist == null ? "NA" : `${leftPoseDist.toFixed(2)} Å`}`
      : `${leftPid} 未识别到 Zn`;
    const rightZn = rightInfo && rightInfo.znInfo && rightInfo.znInfo.zn
      ? `${rightPid} 目标Zn ${rightZnSite} | 当前pose最短距离 ${rightPoseDist == null ? "NA" : `${rightPoseDist.toFixed(2)} Å`}`
      : `${rightPid} 未识别到 Zn`;
    const threshold = getRiskThreshold();
    const risky = [leftPoseDist, rightPoseDist].some((d) => d != null && d > threshold);
    setStatusWarn(risky);
    setSideSummary("left", {
      title: `左侧 ${leftPid}`,
      pose: (leftMeta && leftMeta.filename) || leftPose.split('/').pop().split('?')[0],
      znSite: leftZnSite || "NA",
      distanceText: leftPoseDist == null ? "NA" : `${leftPoseDist.toFixed(2)} Å`,
      tone: distanceTone(leftPoseDist),
      note: leftMeta && leftMeta.isMasterBest ? "当前表Best pose" : "",
    });
    setSideSummary("right", {
      title: `右侧 ${rightPid}`,
      pose: (rightMeta && rightMeta.filename) || rightPose.split('/').pop().split('?')[0],
      znSite: rightZnSite || "NA",
      distanceText: rightPoseDist == null ? "NA" : `${rightPoseDist.toFixed(2)} Å`,
      tone: distanceTone(rightPoseDist),
      note: rightMeta && rightMeta.isMasterBest ? "当前表Best pose" : "",
    });
    setStatus(`加载完成，默认已按目标 Zn 位点定位。阈值 ${threshold.toFixed(1)} Å。${leftZn}；${rightZn}${risky ? "；当前存在高风险 pose" : ""}`);
  } catch (e) {
    const msg = "加载失败：" + (e && e.message ? e.message : "unknown");
    setViewerNotice("left", msg, "error");
    setViewerNotice("right", msg, "error");
    setSideSummary("left", {title: "左侧加载失败", note: msg, tone: "warn"});
    setSideSummary("right", {title: "右侧加载失败", note: msg, tone: "warn"});
    setStatusWarn(true);
    setStatus(msg);
  }
}

});

document.getElementById("online_submit_btn").addEventListener("click", submitOnlineJob);
document.getElementById("online_poll_btn").addEventListener("click", pollOnlineJob);
document.getElementById("online_load_btn").addEventListener("click", loadCompareOnline);
document.getElementById("auto_top2_btn").addEventListener("click", applyAutoTop2FromLeft);
document.getElementById("measure_mode_btn").addEventListener("click", ()=>{
  measureMode = !measureMode;
  document.getElementById("measure_mode_btn").textContent = "测量模式：" + (measureMode ? "开" : "关");
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    state.measurePoints = [];
  }
  setStatus(measureMode ? "测量模式已开启：每个窗口点击2点测键长，连续点击3点测键角" : "测量模式已关闭");
});
document.getElementById("measure_clear_btn").addEventListener("click", ()=>{
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    clearMeasurementForViewer(viewer, state);
    if (viewer.render) viewer.render();
  }
  setStatus("测量结果已清空");
});
document.getElementById("res_label_btn").addEventListener("click", ()=>{
  residueLabelMode = !residueLabelMode;
  document.getElementById("res_label_btn").textContent = "残基标签：" + (residueLabelMode ? "开" : "关");
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    if (residueLabelMode) {
      if (state.lastSel) labelResiduesInSelection(viewer, state, state.lastSel);
    } else {
      clearViewerLabels(viewer, state);
    }
    if (viewer.render) viewer.render();
  }
  setStatus(residueLabelMode ? "已开启残基标签，可点击残基或ZN查看5Å邻域标签" : "已关闭残基标签");
});
window.addEventListener("load", async ()=>{
  try {
    resetOnlineProgress("等待提交");
    await ensureViewersReady();
    await initData();
    await renderPoseOptions("left");
    await renderPoseOptions("right");
    await applyAutoTop2FromLeft();
    await refreshRankForSide("right");
    loadCompare();
  } catch (e) {
    setStatusWarn(true);
    setStatus("初始化失败：" + (e && e.message ? e.message : "unknown"));
  }
  if (!window.$3Dmol) {
    setStatus((document.getElementById("status").textContent || "状态未知") + " | " + viewerUnavailableMessage());
  }
});
</script>
</body>
</html>
