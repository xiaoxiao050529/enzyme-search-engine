<script>
let db = null;
let viewer;
let pickedLabel = null;
let selectedId = "";
let masterFull = null;
let currentItem = null;
let znMode = false;
let residueLabelMode = false;
let fiveAMode = false;
let znInteractionShapes = [];
let residueInteractionShapes = [];
let znResidueLabels = [];
let residueNeighborLabels = [];
let fiveAAtomLabels = [];
let measureMode = false;
let measurePoints = [];
let measureShapes = [];
let measureLabels = [];
let pocketMode = true;
let pocketShapes = [];
let pocketLabels = [];
let pocketForceShapes = [];
let currentStructureText = "";
let currentStructureFmt = "";
let currentStructureZnAtoms = [];
let structureModelRef = null;
let ligandModelRef = null;
let znMarkerModelRef = null;
let znVisibleShapes = [];
let znVisibleLabels = [];
let seqState = {text:"", residueMap:new Map(), indexMap:new Map(), residueInfo:new Map(), chainBlocks:[], selectedKey:"", hoverKey:""};
const routeParams = new URLSearchParams(window.location.search);
const routePdb = (routeParams.get("pdb") || "").trim();
const routeDataset = (routeParams.get("dataset") || "").trim().toLowerCase();
let routeHandled = false;
let tableRegistry = [];
let currentDatasetEntry = null;
let detectedApiBase = "";
try {
  if (window.$3Dmol) {
    viewer = $3Dmol.createViewer("viewer", {backgroundColor:"white"});
  } else {
    viewer = { clear(){}, addModel(){ return { setStyle(){}, }; }, setStyle(){}, zoomTo(){}, render(){} };
  }
} catch (e) {
  viewer = { clear(){}, addModel(){ return { setStyle(){}, }; }, setStyle(){}, zoomTo(){}, render(){} };
}
function datasetPath(entry, key) {
  const file = entry && entry[key] ? String(entry[key]) : "";
  return file ? `../backend/data/${file}` : "";
}
function getApiBaseCandidates() {
  const h = window.location.hostname || "127.0.0.1";
  return [...new Set([
    `http://${h}:8015`,
    `http://${h}:8017`,
    `http://${h}:8016`,
    "http://127.0.0.1:8015",
    "http://127.0.0.1:8017",
    "http://127.0.0.1:8016"
  ])];
}
async function detectApiBase() {
  if (detectedApiBase) return detectedApiBase;
  for (const base of getApiBaseCandidates()) {
    try {
      const res = await fetch(base + "/api/pdbzn/workflow/config?t=" + Date.now());
      if (!res.ok) continue;
      const obj = await res.json();
      if (obj && obj.ok) {
        detectedApiBase = base;
        return detectedApiBase;
      }
    } catch (_) {}
  }
  return "";
}
function getSelectedDatasetEntry() {
  const id = String(document.getElementById("dataset").value || "").trim();
  return tableRegistry.find((t) => String(t.id || "") === id) || tableRegistry[0] || null;
}
function populateDatasetOptions() {
  const sel = document.getElementById("dataset");
  sel.innerHTML = "";
  for (const table of tableRegistry) {
    const op = document.createElement("option");
    op.value = table.id;
    op.textContent = table.label || table.id;
    sel.appendChild(op);
  }
  if (routeDataset && tableRegistry.some((t) => String(t.id || "") === routeDataset)) {
    sel.value = routeDataset;
  } else if (tableRegistry.some((t) => String(t.id || "") === "table1")) {
    sel.value = "table1";
  }
}
async function loadDatasetRegistry() {
  try {
    const res = await fetch("../backend/data/table_registry.json?t=" + Date.now());
    if (!res.ok) throw new Error("registry unavailable");
    const obj = await res.json();
    const tables = Array.isArray(obj?.tables) ? obj.tables.filter((t) => t && t.id) : [];
    tableRegistry = tables.length ? tables : [{
      id: "table1",
      label: "Table 1",
      data: "table1_data.json",
      full: "table1_master_full.json"
    }];
  } catch (_) {
    tableRegistry = [{
      id: "table1",
      label: "Table 1",
      data: "table1_data.json",
      full: "table1_master_full.json"
    }];
  }
  populateDatasetOptions();
}
function loadData() {
  currentDatasetEntry = getSelectedDatasetEntry();
  const src = datasetPath(currentDatasetEntry, "data") || datasetPath(currentDatasetEntry, "full") || "../backend/data/data.json";
  const status = document.getElementById("status");
  const label = currentDatasetEntry && currentDatasetEntry.label ? currentDatasetEntry.label : src;
  status.textContent = "正在加载数据源：" + label;
  const url = src + "?t=" + Date.now();
  masterFull = null;
  fetch(url).then(r=>{
    if(!r.ok) throw new Error("数据源不可用");
    return r.json();
  }).then(j=>{ 
    db=j; 
    const count = Array.isArray(db.items) ? db.items.length : (Array.isArray(db.rows) ? db.rows.length : 0);
    status.textContent = "已加载：" + label + "，条目数：" + count;
    loadList();
    tryOpenRoutePdb();
  }).catch((e)=>{
    const fallback = datasetPath(currentDatasetEntry, "full") || "../backend/data/master_full.json";
    status.textContent = "当前数据源不可用，尝试备用：" + fallback + "；错误：" + (e && e.message ? e.message : "unknown");
    fetch(fallback + "?t=" + Date.now()).then(r=>{
      if(!r.ok) throw new Error("备用数据源不可用");
      return r.json();
    }).then(j=>{ 
      db=j; 
      const count = Array.isArray(db.items) ? db.items.length : (Array.isArray(db.rows) ? db.rows.length : 0);
      status.textContent = "已加载备用数据源：" + fallback + "，条目数：" + count; 
      loadList();
      tryOpenRoutePdb();
    }).catch((ee)=>{ status.textContent = "加载失败，请稍后重试或检查数据文件；错误：" + (ee && ee.message ? ee.message : "unknown"); });
  });
}
function setDebugError(text) {
  const box = document.getElementById("debug_error");
  box.textContent = text || "";
}
function setZnError(text) {
  const box = document.getElementById("zn_error");
  box.textContent = text || "";
}
function extractZnAtomsFromPdbText(text) {
  const out = [];
  const lines = String(text || "").split(/\r?\n/);
  for (const ln of lines) {
    if (!(ln.startsWith("ATOM") || ln.startsWith("HETATM"))) continue;
    const atomName = ln.slice(12, 16).trim().toUpperCase();
    const elem = ln.length >= 78 ? ln.slice(76, 78).trim().toUpperCase() : "";
    if (atomName !== "ZN" && elem !== "ZN") continue;
    const x = Number(ln.slice(30, 38));
    const y = Number(ln.slice(38, 46));
    const z = Number(ln.slice(46, 54));
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({x, y, z});
  }
  return out;
}
function extractZnAtomsFromCifText(text) {
  const out = [];
  const lines = String(text || "").split(/\r?\n/);
  const candidates = lines.filter(ln => ln.includes(" ZN ") || ln.includes(" ZN2+") || ln.includes("ZN"));
  for (const ln of candidates) {
    const nums = ln.match(/-?\d+(?:\.\d+)?/g) || [];
    if (nums.length < 3) continue;
    const x = Number(nums[nums.length - 3]);
    const y = Number(nums[nums.length - 2]);
    const z = Number(nums[nums.length - 1]);
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({x, y, z});
  }
  return out;
}
function getStructureZnAtoms() {
  if (Array.isArray(currentStructureZnAtoms) && currentStructureZnAtoms.length) return currentStructureZnAtoms;
  if (!currentStructureText) return [];
  const parsed = currentStructureFmt === "cif" ? extractZnAtomsFromCifText(currentStructureText) : extractZnAtomsFromPdbText(currentStructureText);
  if (parsed.length) return parsed;
  if (structureModelRef && structureModelRef.selectedAtoms) {
    const z = structureModelRef.selectedAtoms({elem:"ZN"}) || [];
    return z.map(a=>({x:a.x, y:a.y, z:a.z})).filter(a=>Number.isFinite(a.x)&&Number.isFinite(a.y)&&Number.isFinite(a.z));
  }
  return [];
}
function guessElemFromAtomName(name4) {
  const t = String(name4 || "").trim().toUpperCase();
  if (!t) return "";
  const m = t.match(/[A-Z]+/);
  if (!m) return "";
  const letters = m[0];
  if (letters.length >= 2) {
    const two = letters.slice(0, 2);
    if (two === "ZN" || two === "FE" || two === "MG" || two === "MN" || two === "CA" || two === "NA" || two === "CL") return two;
  }
  return letters[0];
}
function normalizePdbElementColumns(text) {
  const out = [];
  for (const raw of String(text || "").split(/\r?\n/)) {
    let ln = String(raw || "");
    if (!(ln.startsWith("ATOM") || ln.startsWith("HETATM"))) {
      out.push(ln);
      continue;
    }
    if (ln.length < 80) ln = ln.padEnd(80, " ");
    const elemCol = ln.slice(76, 78).trim();
    if (elemCol) {
      out.push(ln);
      continue;
    }
    const elem = guessElemFromAtomName(ln.slice(12, 16));
    const fixed = ln.slice(0, 76) + elem.padStart(2, " ") + ln.slice(78);
    out.push(fixed);
  }
  return out.join("\n");
}
function tryOpenRoutePdb() {
  if (routeHandled || !routePdb) return;
  routeHandled = true;
  document.getElementById("find_pdb").value = routePdb;
  find();
}
function loadList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const q = document.getElementById("search").value.trim().toLowerCase();
  const c = document.getElementById("cluster").value.trim();
  
  let sourceItems = [];
  if (db && db.items) sourceItems = db.items;
  else if (db && db.rows) sourceItems = db.rows.map(r => ({
    id: r.Representative,
    name: r.Protein_Name,
    cluster: r.Cluster_ID,
    species: r.Species || "",
    receptor_pdb: r.Receptor_Path,
    best_sdf: r.Best_Ligand_Path,
    receptor_rel: r.Receptor_Path ? r.Receptor_Path.replace("/root/PDB_ZN/diffdock_inputs/receptors/", "../backend/data/structures/") : ""
  }));

  const items = sourceItems.filter(x => {
    if (c && String(x.cluster) !== c) return false;
    if (q && !(x.name || "").toLowerCase().includes(q) && !(x.id || "").toLowerCase().includes(q)) return false;
    return true;
  });
  if(items.length === 0){
    const empty = document.createElement("div");
    empty.textContent = "无数据，请更换数据源或稍后重试";
    list.appendChild(empty);
  }
  for (const it of items) {
    const div = document.createElement("div");
    div.className = "item";
    if ((it.id || "").toUpperCase() === (selectedId || "").toUpperCase()) div.style.background = "#e6f4ff";
    div.textContent = `${it.id} | ${it.name || ""} | cluster=${it.cluster} | ${it.species || ""}`;
    div.onclick = () => show(it);
    list.appendChild(div);
  }
}
async function ensureMasterFull() {
  if (masterFull) return masterFull;
  const entry = getSelectedDatasetEntry();
  const src = datasetPath(entry, "full") || "../backend/data/master_full.json";
  const res = await fetch(src + "?t=" + Date.now());
  if (!res.ok) throw new Error("master_full.json 不可用");
  masterFull = await res.json();
  return masterFull;
}
function renderDetailTable(target, header) {
  const box = document.getElementById("detail");
  const table = document.createElement("table");
  table.style.borderCollapse = "collapse";
  for (const k of (header || Object.keys(target))) {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td");
    const td2 = document.createElement("td");
    td1.textContent = k;
    td2.textContent = target[k] || "";
    td1.style.border = "1px solid #ddd"; td1.style.padding = "4px";
    td2.style.border = "1px solid #ddd"; td2.style.padding = "4px";
    tr.appendChild(td1); tr.appendChild(td2);
    table.appendChild(tr);
  }
  box.innerHTML = "";
  box.appendChild(table);
}
function residueKey(chain, resi) {
  return `${chain || ""}:${String(resi ?? "")}`;
}
function setSequenceStatus(text) {
  document.getElementById("seq_content").textContent = text;
}
function residueOneLetter(resn) {
  const key = String(resn || "").toUpperCase();
  const table = {
    ALA: "A", ARG: "R", ASN: "N", ASP: "D", CYS: "C",
    GLN: "Q", GLU: "E", GLY: "G", HIS: "H", HID: "H",
    HIE: "H", HIP: "H", HSD: "H", HSE: "H", HSP: "H",
    ILE: "I", LEU: "L", LYS: "K", MET: "M", PHE: "F",
    PRO: "P", SER: "S", THR: "T", TRP: "W", TYR: "Y",
    VAL: "V", SEC: "U", PYL: "O", ASX: "B", GLX: "Z",
    MSE: "M"
  };
  return table[key] || "X";
}
function getStructureResidues() {
  const model = structureModelRef && structureModelRef.selectedAtoms ? structureModelRef : null;
  if (!model || !model.selectedAtoms) return [];
  const caAtoms = model.selectedAtoms({atom:"CA"}) || [];
  const source = caAtoms.length ? caAtoms : (model.selectedAtoms({}) || []);
  const uniq = new Map();
  for (const a of source) {
    if (!a) continue;
    const resn = String(a.resn || "").toUpperCase();
    if (resn === "HOH" || resn === "WAT" || resn === "ZN") continue;
    const key = residueKey(a.chain, a.resi);
    const prev = uniq.get(key);
    if (!prev || a.atom === "CA") uniq.set(key, a);
  }
  const residues = Array.from(uniq.values());
  residues.sort((a, b)=>{
    const ca = String(a.chain || "");
    const cb = String(b.chain || "");
    if (ca !== cb) return ca.localeCompare(cb);
    const ra = parseResiOrder(a.resi);
    const rb = parseResiOrder(b.resi);
    if (ra.n !== rb.n) return ra.n - rb.n;
    return ra.s.localeCompare(rb.s);
  });
  return residues;
}
function renderSequenceText(seqText) {
  const content = document.getElementById("seq_content");
  content.innerHTML = "";
  if (Array.isArray(seqState.chainBlocks) && seqState.chainBlocks.length) {
    for (const block of seqState.chainBlocks) {
      const wrap = document.createElement("div");
      wrap.className = "seq_chain";
      const head = document.createElement("div");
      head.className = "seq_chain_head";
      head.textContent = `Chain ${block.chain || "?"}`;
      wrap.appendChild(head);
      const body = document.createElement("div");
      body.className = "seq_chain_body";
      for (const item of block.residues) {
        const span = document.createElement("span");
        span.className = "seq_aa";
        span.dataset.idx = String(item.index);
        span.dataset.key = item.key;
        span.title = `${item.chain}:${item.resn}${item.resi}`;
        span.textContent = item.letter;
        body.appendChild(span);
      }
      wrap.appendChild(body);
      content.appendChild(wrap);
    }
    return;
  }
  if (!seqText) {
    content.textContent = "无序列信息";
    return;
  }
  for (let i = 0; i < seqText.length; i++) {
    const span = document.createElement("span");
    span.className = "seq_aa";
    span.dataset.idx = String(i + 1);
    span.textContent = seqText[i];
    content.appendChild(span);
  }
}
function highlightSequenceResidues() {
  const content = document.getElementById("seq_content");
  const activeKeys = new Set();
  if (seqState.selectedKey) activeKeys.add(seqState.selectedKey);
  if (seqState.hoverKey) activeKeys.add(seqState.hoverKey);
  const spans = content.querySelectorAll(".seq_aa");
  for (const s of spans) {
    const key = String(s.dataset.key || "");
    if (key) {
      s.classList.toggle("active", activeKeys.has(key));
      continue;
    }
    const idx = Number(s.dataset.idx || "0");

    setDebugError(`phase=done\nrid=${rid}\nurl=${vertUrl}\npoint_count=${points.length}\nshown_points=${drawPts.length}\nzn_count=${znAtoms.length}\nhis_count=${site.hisHits.length}\npocket_near_zn=${site.pocketNearZn}\nactive_site=${site.active}\nmin_pocket_zn=${site.minPocketZn == null ? "N/A" : site.minPocketZn.toFixed(3)}\nline_count=${pocketForceShapes.length}`);

function offsetLabelPos(a, ref) {

  let vx = a.x - r.x;
  let vy = a.y - r.y;
  let vz = a.z - r.z;
  const n = Math.sqrt(vx*vx + vy*vy + vz*vz);
  if (n < 1e-6) {
    vx = 0;
    vy = 1;
    vz = 0;
  } else {
    vx /= n;
    vy /= n;
    vz /= n;
  }

}

    resn: z.resn || "ZN",

    if (String(a.elem || "").toUpperCase() === "H") continue;
    if (String(a.elem || "").toUpperCase() === "ZN" || String(a.resn || "").toUpperCase() === "ZN") continue;
    let mind = Infinity;
    let closestZn = null;
    for (const z of znAtoms) {
      const d = dist(a, z);
      if (d < mind) {
        mind = d;
        closestZn = z;
      }
    }
    if (mind > 5.0) continue;
    const key = `${a.chain || ""}:${a.resn || ""}${a.resi || ""}`;
    const prev = residueMap.get(key);
    if (!prev) {
      residueMap.set(key, {
        chain: a.chain,
        resn: a.resn,
        resi: a.resi,
        labelAtom: a,
        interactionAtom: a,
        closestZn,
        minDist: mind

    }
    if (a.atom === "CA" && (!prev.labelAtom || prev.labelAtom.atom !== "CA")) {
      prev.labelAtom = a;
    }
    if (mind < prev.minDist) {

      prev.closestZn = closestZn;

function collectNearResiduesByAtom(anchorAtom, cutoff) {
  if (!anchorAtom) return [];
  const model = structureModelRef && structureModelRef.selectedAtoms ? structureModelRef : null;
  if (!model || !model.selectedAtoms) return [];
  const atoms = model.selectedAtoms({}) || [];
  const centerKey = `${anchorAtom.chain || ""}:${anchorAtom.resn || ""}${anchorAtom.resi || ""}`;
  const resMap = new Map();
  for (const a of atoms) {
    if (!a || a.elem === "H") continue;
    const key = `${a.chain || ""}:${a.resn || ""}${a.resi || ""}`;
    if (key === centerKey) continue;
    const d = dist(anchorAtom, a);

        fontColor: "white",

  if (currentItem) show(currentItem);
});
</script>
</body>
