function loadData() {
  const src = document.getElementById("dataset").value;
  const status = document.getElementById("status");
  status.textContent = "正在加载数据源：" + src;
  const url = src + "?t=" + Date.now();
  fetch(url).then(r=>{
    if(!r.ok) throw new Error("数据源不可用");
    return r.json();
  }).then(j=>{ 
    db=j; 
    const count = Array.isArray(db.items) ? db.items.length : (Array.isArray(db.rows) ? db.rows.length : 0);
    status.textContent = "已加载：" + src + "，条目数：" + count;
    loadList();
    tryOpenRoutePdb();
  }).catch((e)=>{
    const fallback = src.includes("master_full") ? "../backend/data/data.json" : "../backend/data/master_full.json";
    status.textContent = "当前数据源不可用，尝试备用：" + fallback + "；错误：" + (e && e.message ? e.message : "unknown");
    fetch(fallback + "?t=" + Date.now()).then(r=>{
      if(!r.ok) throw new Error("备用数据源不可用");
      return r.json();
    }).then(j=>{ 
      db=j; 
      const count = Array.isArray(db.items) ? db.items.length : (Array.isArray(db.rows) ? db.rows.length : 0);
      status.textContent = "已加载备用数据源：" + fallback + "，条目数：" + count; 
      loadList();
      tryOpenRoutePdb();
    }).catch((ee)=>{ status.textContent = "加载失败，请稍后重试或检查数据文件；错误：" + (ee && ee.message ? ee.message : "unknown"); });
  });
}

  box.textContent = text || "";
}
function setZnError(text) {
  const box = document.getElementById("zn_error");
  box.textContent = text || "";
}
function extractZnAtomsFromPdbText(text) {
  const out = [];
  const lines = String(text || "").split(/\r?\n/);
  for (const ln of lines) {
    if (!(ln.startsWith("ATOM") || ln.startsWith("HETATM"))) continue;
    const atomName = ln.slice(12, 16).trim().toUpperCase();
    const elem = ln.length >= 78 ? ln.slice(76, 78).trim().toUpperCase() : "";
    if (atomName !== "ZN" && elem !== "ZN") continue;
    const x = Number(ln.slice(30, 38));
    const y = Number(ln.slice(38, 46));
    const z = Number(ln.slice(46, 54));
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({x, y, z});
  }
  return out;
}
function extractZnAtomsFromCifText(text) {
  const out = [];
  const lines = String(text || "").split(/\r?\n/);
  const candidates = lines.filter(ln => ln.includes(" ZN ") || ln.includes(" ZN2+") || ln.includes("ZN"));
  for (const ln of candidates) {
    const nums = ln.match(/-?\d+(?:\.\d+)?/g) || [];
    if (nums.length < 3) continue;
    const x = Number(nums[nums.length - 3]);
    const y = Number(nums[nums.length - 2]);
    const z = Number(nums[nums.length - 1]);
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({x, y, z});
  }
  return out;
}
function getStructureZnAtoms() {
  if (Array.isArray(currentStructureZnAtoms) && currentStructureZnAtoms.length) return currentStructureZnAtoms;
  if (!currentStructureText) return [];
  const parsed = currentStructureFmt === "cif" ? extractZnAtomsFromCifText(currentStructureText) : extractZnAtomsFromPdbText(currentStructureText);
  if (parsed.length) return parsed;
  if (structureModelRef && structureModelRef.selectedAtoms) {
    const z = structureModelRef.selectedAtoms({elem:"ZN"}) || [];
    return z.map(a=>({x:a.x, y:a.y, z:a.z})).filter(a=>Number.isFinite(a.x)&&Number.isFinite(a.y)&&Number.isFinite(a.z));
  }
  return [];
}
function guessElemFromAtomName(name4) {
  const t = String(name4 || "").trim().toUpperCase();
  if (!t) return "";
  const m = t.match(/[A-Z]+/);
  if (!m) return "";
  const letters = m[0];
  if (letters.length >= 2) {
    const two = letters.slice(0, 2);
    if (two === "ZN" || two === "FE" || two === "MG" || two === "MN" || two === "CA" || two === "NA" || two === "CL") return two;
  }
  return letters[0];
}
function normalizePdbElementColumns(text) {
  const out = [];
  for (const raw of String(text || "").split(/\r?\n/)) {
    let ln = String(raw || "");
    if (!(ln.startsWith("ATOM") || ln.startsWith("HETATM"))) {
      out.push(ln);
      continue;
    }
    if (ln.length < 80) ln = ln.padEnd(80, " ");
    const elemCol = ln.slice(76, 78).trim();
    if (elemCol) {
      out.push(ln);
      continue;
    }
    const elem = guessElemFromAtomName(ln.slice(12, 16));
    const fixed = ln.slice(0, 76) + elem.padStart(2, " ") + ln.slice(78);
    out.push(fixed);
  }
  return out.join("\n");
}
function tryOpenRoutePdb() {
  if (routeHandled || !routePdb) return;
  routeHandled = true;
  document.getElementById("find_pdb").value = routePdb;
  find();
}
function loadList() {
  const list = document.getElementById("list");
  list.innerHTML = "";
  const q = document.getElementById("search").value.trim().toLowerCase();
  const c = document.getElementById("cluster").value.trim();
  
  let sourceItems = [];
  if (db && db.items) sourceItems = db.items;
  else if (db && db.rows) sourceItems = db.rows.map(r => ({
    id: r.Representative,
    name: r.Protein_Name,
    cluster: r.Cluster_ID,
    species: r.Species || "",
    receptor_pdb: r.Receptor_Path,
    best_sdf: r.Best_Ligand_Path,
    receptor_rel: r.Receptor_Path ? r.Receptor_Path.replace("/root/PDB_ZN/diffdock_inputs/receptors/", "../backend/data/structures/") : ""
  }));

  const items = sourceItems.filter(x => {
    if (c && String(x.cluster) !== c) return false;
    if (q && !(x.name || "").toLowerCase().includes(q) && !(x.id || "").toLowerCase().includes(q)) return false;
    return true;
  });
  if(items.length === 0){
    const empty = document.createElement("div");
    empty.textContent = "无数据，请更换数据源或稍后重试";
    list.appendChild(empty);
  }
  for (const it of items) {
    const div = document.createElement("div");
    div.className = "item";
    if ((it.id || "").toUpperCase() === (selectedId || "").toUpperCase()) div.style.background = "#e6f4ff";
    div.textContent = `${it.id} | ${it.name || ""} | cluster=${it.cluster} | ${it.species || ""}`;
    div.onclick = () => show(it);
    list.appendChild(div);
  }
}
async function ensureMasterFull() {
  if (masterFull) return masterFull;
  const res = await fetch("../backend/data/master_full.json?t=" + Date.now());
  if (!res.ok) throw new Error("master_full.json 不可用");
  masterFull = await res.json();
  return masterFull;
}
function renderDetailTable(target, header) {
  const box = document.getElementById("detail");
  const table = document.createElement("table");
  table.style.borderCollapse = "collapse";
  for (const k of (header || Object.keys(target))) {
    const tr = document.createElement("tr");
    const td1 = document.createElement("td");
    const td2 = document.createElement("td");
    td1.textContent = k;
    td2.textContent = target[k] || "";
    td1.style.border = "1px solid #ddd"; td1.style.padding = "4px";
    td2.style.border = "1px solid #ddd"; td2.style.padding = "4px";
    tr.appendChild(td1); tr.appendChild(td2);
    table.appendChild(tr);
  }
  box.innerHTML = "";
  box.appendChild(table);
}
function residueKey(chain, resi) {
  return `${chain || ""}:${String(resi ?? "")}`;
}
function setSequenceStatus(text) {
  document.getElementById("seq_content").textContent = text;
}
function renderSequenceText(seqText) {
  const content = document.getElementById("seq_content");
  content.innerHTML = "";
  if (!seqText) {
    content.textContent = "无序列信息";
    return;
  }
  for (let i = 0; i < seqText.length; i++) {
    const span = document.createElement("span");
    span.className = "seq_aa";
    span.dataset.idx = String(i + 1);
    span.textContent = seqText[i];
    content.appendChild(span);
  }
}
function highlightSequenceResidues() {
  const content = document.getElementById("seq_content");
  const active = new Set();
  if (seqState.selectedKey && seqState.residueMap.has(seqState.selectedKey)) active.add(seqState.residueMap.get(seqState.selectedKey));
  if (seqState.hoverKey && seqState.residueMap.has(seqState.hoverKey)) active.add(seqState.residueMap.get(seqState.hoverKey));
  const spans = content.querySelectorAll(".seq_aa");
  for (const s of spans) {
    const idx = Number(s.dataset.idx || "0");
    s.classList.toggle("active", active.has(idx));
  }
}
function parseResiOrder(v) {
  const t = String(v ?? "");
  const m = t.match(/^(-?\d+)(.*)$/);
  if (!m) return {n: 10**9, s: t};
  return {n: Number(m[1]), s: m[2] || ""};
}
function buildResidueMapFromModel() {
  seqState.residueMap = new Map();
  if (!viewer.getModel) return;
  const model = viewer.getModel();
  if (!model || !model.selectedAtoms) return;
  const caAtoms = model.selectedAtoms({atom:"CA"}) || [];
  const source = caAtoms.length ? caAtoms : (model.selectedAtoms({}) || []);
  const uniq = new Map();
  for (const a of source) {
    const key = residueKey(a.chain, a.resi);
    if (!uniq.has(key)) uniq.set(key, a);
  }
  const residues = Array.from(uniq.values());
  residues.sort((a, b)=>{
    const ca = String(a.chain || "");
    const cb = String(b.chain || "");
    if (ca !== cb) return ca.localeCompare(cb);
    const ra = parseResiOrder(a.resi);
    const rb = parseResiOrder(b.resi);
    if (ra.n !== rb.n) return ra.n - rb.n;
    return ra.s.localeCompare(rb.s);
  });
  const len = seqState.text.length;
  const n = Math.min(len, residues.length);
  for (let i = 0; i < n; i++) {
    const a = residues[i];
    seqState.residueMap.set(residueKey(a.chain, a.resi), i + 1);
  }
}
async function resolveSequenceText(it) {
  if (it && typeof it.monomer_seq === "string" && it.monomer_seq.trim()) return it.monomer_seq.trim();
  try {
    const j = await ensureMasterFull();
    const rows = j.rows || [];
    const id = (it && it.id ? it.id : "").toUpperCase();
    const row = rows.find(x => ((x["_id"] || "").toUpperCase() === id)) ||
      rows.find(x => {
        const p = (x["Receptor_PDB"] || "").split("/").pop();
        const b = p ? p.split(".")[0] : "";
        return b.toUpperCase() === id;
      });
    if (!row) return "";
    return String(row["MonomerSeq"] || row["monomer_seq"] || row["Sequence"] || "").trim();
  } catch (_) {
    return "";
  }
}
async function renderSequenceForItem(it) {
  setSequenceStatus("序列加载中...");
  const text = await resolveSequenceText(it);
  seqState.text = text || "";
  seqState.selectedKey = "";
  seqState.hoverKey = "";
  renderSequenceText(seqState.text);
}
function setSequenceHoverFromAtom(atom) {
  if (!atom) return;
  seqState.hoverKey = residueKey(atom.chain, atom.resi);
  highlightSequenceResidues();
}
function setSequenceSelectedFromAtom(atom) {
  if (!atom) return;
  seqState.selectedKey = residueKey(atom.chain, atom.resi);
  highlightSequenceResidues();
}
function clearSequenceHover() {
  seqState.hoverKey = "";
  highlightSequenceResidues();
}
async function syncDetailById(id) {
  if (!id) return;
  const box = document.getElementById("detail");
  try {
    const j = await ensureMasterFull();
    const rows = j.rows || [];
    const target = rows.find(x => (x["_id"] || "").toUpperCase() === id.toUpperCase()) ||
      rows.find(x => {
        const p = (x["Receptor_PDB"] || "").split("/").pop();
        const b = p ? p.split(".")[0] : "";
        return b.toUpperCase() === id.toUpperCase();
      });
    if (!target) {
      box.textContent = "未找到该PDB";
      return;
    }
    renderDetailTable(target, j.header);
  } catch (_) {
    box.textContent = "详情加载失败";
  }
}
async function loadStructureForItem(it) {
  const status = document.getElementById("status");
  setDebugError("");
  currentStructureText = "";
  currentStructureFmt = "";
  currentStructureZnAtoms = [];
  const rid = (it.id || "").trim();
  const candidates = [];
  if (it.receptor_rel) candidates.push(it.receptor_rel);
  if (it.receptor_pdb) candidates.push(it.receptor_pdb);
  if (rid) {
    candidates.push(`../backend/data/structures/${rid}.pdb`);
    candidates.push(`../backend/data/structures/${rid}.cif`);
  }
  const seen = new Set();
  for (const c of candidates) {
    if (!c || seen.has(c)) continue;
    seen.add(c);
    try {
      const res = await fetch(c + "?t=" + Date.now());
      if (!res.ok) continue;
      const rawTxt = await res.text();
      const fmt = c.toLowerCase().endsWith(".cif") ? "cif" : "pdb";
      if (!looksLikePdbOrCif(rawTxt, fmt)) continue;
      const txt = fmt === "pdb" ? normalizePdbElementColumns(rawTxt) : rawTxt;
      const m = viewer.addModel(txt, fmt);
      try {
        viewer.render();
      } catch (_) {
        if (viewer.removeModel && m) {
          try { viewer.removeModel(m); } catch (_) {}
        }
        continue;
      }
      currentStructureText = txt;
      currentStructureFmt = fmt;
      currentStructureZnAtoms = fmt === "cif" ? extractZnAtomsFromCifText(txt) : extractZnAtomsFromPdbText(txt);
      structureModelRef = m || null;
      status.textContent = `已加载：${it.id || ""} (${c})`;
      setDebugError(`phase=structure_loaded\nrid=${it.id || ""}\nsource=${c}\nfmt=${fmt}\ntext_size=${txt.length}`);
      return true;
    } catch (_) {}
  }
  status.textContent = `结构加载失败：${it.id || ""}，未找到对应PDB/CIF`;
  return false;
}
async function loadLigandForItem(it) {
  const status = document.getElementById("status");
  const rid = (it.id || "").trim();
  const candidates = [];
  if (it.best_sdf) candidates.push(it.best_sdf);
  if (it.ligand_rel) candidates.push(it.ligand_rel);
  if (rid) candidates.push(`../backend/data/ligands/${rid}.sdf`);
  const seen = new Set();
  for (const c of candidates) {
    if (!c || seen.has(c)) continue;
    seen.add(c);
    try {
      const res = await fetch(c + "?t=" + Date.now());
      if (!res.ok) continue;
      const txt = await res.text();
      if (!looksLikeSdf(txt)) continue;
      const m = viewer.addModel(txt, "sdf");
      try {
        viewer.render();
      } catch (_) {
        if (viewer.removeModel && m) {
          try { viewer.removeModel(m); } catch (_) {}
        }
        continue;
      }
      ligandModelRef = m || null;
      status.textContent = `已加载：${it.id || ""}（含配体构象）`;
      setDebugError(`phase=ligand_loaded\nrid=${it.id || ""}\nsource=${c}\ntext_size=${txt.length}`);
      return true;
    } catch (_) {}
  }
  status.textContent = `已加载：${it.id || ""}（未找到可用配体SDF）`;
  return false;
}
function applyBaseStyles() {
  if (structureModelRef && structureModelRef.setStyle) {
    structureModelRef.setStyle({}, {cartoon:{color:"steelblue", opacity:0.86}});
    structureModelRef.setStyle({elem:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
    structureModelRef.setStyle({within:{distance:3.0, sel:{elem:"ZN"}}}, {stick:{colorscheme:"greenCarbon", radius:0.18}});
  }
  if (ligandModelRef && ligandModelRef.setStyle) {
    ligandModelRef.setStyle({}, {stick:{colorscheme:"cyanCarbon", radius:0.2}});
  }
}
function clearZnVisibleAtoms() {
  if (viewer.removeShape) {
    for (const s of znVisibleShapes) {
      try { viewer.removeShape(s); } catch (_) {}
    }
  }
  znVisibleShapes = [];
  if (viewer.removeLabel) {
    for (const l of znVisibleLabels) {
      try { viewer.removeLabel(l); } catch (_) {}
    }
  }
  znVisibleLabels = [];
}
function drawZnVisibleAtoms(forceFocus) {
  clearZnVisibleAtoms();
  const znAtoms = getStructureZnAtoms();

    measurePoints = [];
  } else {
    document.getElementById("status").textContent = `测量点1：${atomName(atom)}，请继续点击第2个原子`;
  }
  viewer.render();
}
function show(it) {
  selectedId = it.id || "";
  document.getElementById("find_pdb").value = selectedId;
  currentItem = it;
  structureModelRef = null;
  ligandModelRef = null;
  setZnError("Zn显示：加载中");
  loadList();
  syncDetailById(selectedId);
  renderSequenceForItem(it);
  clearZnVisibleAtoms();
  viewer.clear();
  clearPocketOverlays();
  clearMeasurement();
  if (pickedLabel && viewer.removeLabel) {
    viewer.removeLabel(pickedLabel);
    pickedLabel = null;
  }
  document.getElementById("picked").textContent = "当前残基：未选择";
  loadStructureForItem(it).then(async (ok)=>{
    if (!ok) return;
    applyBaseStyles();
    await loadLigandForItem(it);
    applyBaseStyles();
    drawZnVisibleAtoms(true);
    applyZnNeighborhood();
    await loadBestPocketOverlay(it);
    buildResidueMapFromModel();
    highlightSequenceResidues();
    if (viewer.setClickable) {
      viewer.setClickable({}, true, function(atom) {
        if (!atom) return;
        if (measureMode) {
          handleMeasureClick(atom);
          return;
        }
        applyBaseStyles();
        drawZnVisibleAtoms(false);
        applyZnNeighborhood();
        const nearSel = {within:{distance:5.0, sel:{chain: atom.chain, resi: atom.resi}}, byres:true};
        viewer.setStyle(nearSel, {stick:{colorscheme:"whiteCarbon", radius:0.18}});
        viewer.setStyle({chain: atom.chain, resi: atom.resi}, {stick:{color:"orange"}});
        viewer.setStyle({elem:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
        drawZnInteractionsAndLabels();
        labelResiduesInSelection(nearSel);
        const nearLabelCount = labelResiduesAroundAtom(atom);
        const rrCount = drawResidueInteractionsAroundAtom(atom);
        if (pickedLabel && viewer.removeLabel) viewer.removeLabel(pickedLabel);
        if (viewer.addLabel) {
          pickedLabel = viewer.addLabel(`${atom.chain}:${atom.resn}${atom.resi}`, {
            position: {x: atom.x, y: atom.y, z: atom.z},
            backgroundColor: "black",
            fontColor: "white"
          });
        }
        document.getElementById("picked").textContent = `当前残基：链 ${atom.chain}，${atom.resn}${atom.resi}`;
        document.getElementById("status").textContent = `5Å范围：残基标签 ${nearLabelCount} 个，残基相互作用线 ${rrCount} 条`;
        setSequenceSelectedFromAtom(atom);
        viewer.zoomTo(nearSel);
        viewer.render();
      });
    }
    if (viewer.setHoverable) {
      viewer.setHoverable({}, true, function(atom){
        if (!atom) return;
        document.getElementById("hover_info").textContent = `悬停残基：${atom.chain || ""}:${atom.resn || ""}${atom.resi || ""}`;
        setSequenceHoverFromAtom(atom);
      }, function(){
        document.getElementById("hover_info").textContent = "悬停残基：-";
        clearSequenceHover();
      });
    }
    viewer.zoomTo();
    viewer.render();
  });
}
function find() {
  const q = document.getElementById("find_pdb").value.trim();
  if(!q){ return; }
  const box = document.getElementById("detail");
  box.textContent = "正在查询：" + q;
  ensureMasterFull().then(j=>{
    const rows = j.rows || [];
    const target = rows.find(x => (x["_id"]||"").toUpperCase() === q.toUpperCase()) ||
                   rows.find(x => {
                      const p = (x["Receptor_PDB"]||"").split("/").pop();
                      const b = p ? p.split(".")[0] : "";
                      return b.toUpperCase() === q.toUpperCase();
                   });
    if(!target){ box.textContent = "未找到该PDB"; return; }
    const rid = (target["_id"] || "").trim() || (((target["Receptor_PDB"]||"").split("/").pop() || "").split(".")[0]);
    const showItem = ((db && db.items) ? db.items.find(x => (x.id||"").toUpperCase() === rid.toUpperCase()) : null) || {
      id: rid,
      name: target["Protein_Name"] || "",
      cluster: target["Cluster_ID"] || "",
      species: target["Species"] || "",
      receptor_rel: "",
      receptor_pdb: target["Receptor_PDB"] || "",
      best_sdf: target["Best_SDF"] || ""
    };
    document.getElementById("search").value = rid;
    document.getElementById("cluster").value = "";
    selectedId = rid;
    loadList();
    show(showItem);
    renderDetailTable(target, j.header);
  }).catch(()=>{ box.textContent = "查询失败"; });
}
document.getElementById("dataset").value = "../backend/data/data.json";
window.addEventListener("load", loadData);
document.getElementById("cluster").addEventListener("change", loadList);
document.getElementById("search").addEventListener("input", loadList);
document.getElementById("dataset").addEventListener("change", loadData);
document.getElementById("find_btn").addEventListener("click", find);
document.getElementById("find_pdb").addEventListener("keydown", (e)=>{ if(e.key==='Enter') find(); });
document.getElementById("zn_mode_btn").addEventListener("click", ()=>{
  znMode = !znMode;
  document.getElementById("zn_mode_btn").textContent = "ZN邻域模式：" + (znMode ? "开" : "关");
  fiveAMode = znMode && residueLabelMode;
  document.getElementById("fivea_mode_btn").textContent = "5Å相互作用+标签：" + (fiveAMode ? "开" : "关");
  if (currentItem) show(currentItem);
});
document.getElementById("res_label_btn").addEventListener("click", ()=>{
  residueLabelMode = !residueLabelMode;
  document.getElementById("res_label_btn").textContent = "残基标签：" + (residueLabelMode ? "开" : "关");
  fiveAMode = znMode && residueLabelMode;
  document.getElementById("fivea_mode_btn").textContent = "5Å相互作用+标签：" + (fiveAMode ? "开" : "关");
  if (currentItem) show(currentItem);
  if (!residueLabelMode) document.getElementById("status").textContent = "已关闭残基标签";
});
document.getElementById("fivea_mode_btn").addEventListener("click", ()=>{
  fiveAMode = !fiveAMode;
  znMode = fiveAMode;
  residueLabelMode = fiveAMode;
  document.getElementById("fivea_mode_btn").textContent = "5Å相互作用+标签：" + (fiveAMode ? "开" : "关");
  document.getElementById("zn_mode_btn").textContent = "ZN邻域模式：" + (znMode ? "开" : "关");
  document.getElementById("res_label_btn").textContent = "残基标签：" + (residueLabelMode ? "开" : "关");
  if (currentItem) show(currentItem);
  if (!fiveAMode) document.getElementById("status").textContent = "已关闭5Å相互作用与标签";
});
document.getElementById("measure_mode_btn").addEventListener("click", ()=>{
  measureMode = !measureMode;
  document.getElementById("measure_mode_btn").textContent = "测量模式：" + (measureMode ? "开" : "关");
  measurePoints = [];
  document.getElementById("status").textContent = measureMode ? "测量模式已开启：点击2个原子测键长，连续点击3个原子测键角" : "测量模式已关闭";
});
document.getElementById("measure_clear_btn").addEventListener("click", ()=>{
  clearMeasurement();
  viewer.render();
  document.getElementById("status").textContent = "测量结果已清空";
});
document.getElementById("pocket_mode_btn").addEventListener("click", ()=>{
  pocketMode = !pocketMode;
  document.getElementById("pocket_mode_btn").textContent = "口袋包锌可视化：" + (pocketMode ? "开" : "关");
  if (currentItem) show(currentItem);
});
</script>
