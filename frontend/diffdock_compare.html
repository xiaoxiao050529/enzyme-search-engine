<script>
let diffdockIndex = {items:[]};
let masterData = {items:[]};

let vRight;
let residueLabelMode = false;
let measureMode = false;
const viewerStates = new Map();
const receptorInfoCache = new Map();
let autoApplyingTop2 = false;
let onlineJobId = "";
let onlineResult = {apiBase:"", receptor:null, poses:[]};
let localApiBase = "";
let localDataViaApi = false;
let onlinePollTimer = null;
let currentOnlineProgress = 0;
let threeDmolLoader = null;
function createViewerStub() {
  return {
    __viewerStub: true,
    clear(){},
    addModel(){ return { setStyle(){} }; },
    setStyle(){},
    zoomTo(){},
    render(){},
    setClickable(){},
    getModel(){ return { selectedAtoms(){ return []; } }; },
    addLabel(){ return null; },
    removeLabel(){},
    addLine(){ return null; },
    removeShape(){}
  };
}
function makeViewer(id) {
  try {
    if (window.$3Dmol) return $3Dmol.createViewer(id, {backgroundColor:"white"});
  } catch (_) {}
  return createViewerStub();
}
vLeft = createViewerStub();
vRight = createViewerStub();
function setStatus(t) {
  document.getElementById("status").textContent = t;
}
function viewerUnavailableMessage() {
  return "3Dmol 未加载，通常是浏览器无法访问 3Dmol CDN；页面数据仍可浏览，但三维图像无法渲染。";
}
function setViewerNotice(side, text, tone = "normal") {
  const el = document.getElementById(side === "left" ? "viewer_notice_left" : "viewer_notice_right");
  if (!el) return;
  el.textContent = text || "";
  el.classList.toggle("error", tone === "error");
  el.style.display = text ? "block" : "none";
}
function clearViewerNotices() {
  setViewerNotice("left", "");
  setViewerNotice("right", "");
}
function setOnlineProgress(value, label, tone = "normal") {
  const pct = Math.max(0, Math.min(100, Math.round(Number(value) || 0)));
  currentOnlineProgress = pct;
  document.getElementById("online_progress_fill").style.width = pct + "%";
  document.getElementById("online_progress_fill").style.background =
    tone === "error"
      ? "linear-gradient(90deg, #d62828, #f77f00)"
      : "linear-gradient(90deg, #4f8cc9, #67b99a)";
  document.getElementById("online_progress_label").textContent = label || "在线任务进度";
  document.getElementById("online_progress_pct").textContent = pct + "%";
}
function resetOnlineProgress(label = "在线任务进度") {
  setOnlineProgress(0, label, "normal");
}
function diffdockProgressValue(job) {
  const phase = String(job?.phase || job?.status || "queued");
  const table = {
    queued: 6,
    starting: 12,
    prepare_dirs: 20,
    open_log: 28,
    validate_env: 35,
    spawn: 45,
    waiting: 72,
    collect_results: 90,
    done: 100,
    failed: Math.max(currentOnlineProgress, 100),
    failed_no_infer: Math.max(currentOnlineProgress, 100),
    failed_no_pose: Math.max(currentOnlineProgress, 100),
    failed_exception: Math.max(currentOnlineProgress, 100),
  };
  if (table[phase] != null) return table[phase];
  if (String(job?.status || "") === "done") return 100;
  if (String(job?.status || "") === "failed") return Math.max(currentOnlineProgress, 100);
  return Math.max(8, currentOnlineProgress);
}
function updateOnlineProgressFromJob(job) {
  const status = String(job?.status || "queued");
  const phase = String(job?.phase || status);
  const pct = diffdockProgressValue(job);
  const tone = status === "failed" ? "error" : "normal";
  const label = status === "done"
    ? `在线任务完成 (${phase})`
    : (status === "failed" ? `在线任务失败 (${phase})` : `在线任务进行中 (${phase})`);
  setOnlineProgress(pct, label, tone);
}
function stopOnlinePolling() {
  if (onlinePollTimer) {
    clearInterval(onlinePollTimer);
    onlinePollTimer = null;
  }
}
function scheduleOnlinePolling() {
  stopOnlinePolling();
  onlinePollTimer = setInterval(() => {
    if (!onlineJobId) {
      stopOnlinePolling();
      return;
    }
    pollOnlineJob({silent: true});
  }, 3000);
}
function loadExternalScript(url) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = url;
    s.async = true;
    s.onload = () => resolve(true);
    s.onerror = () => reject(new Error("script load failed: " + url));
    document.head.appendChild(s);
  });
}
async function ensure3DmolLoaded() {
  if (window.$3Dmol) return true;
  if (!threeDmolLoader) {
    threeDmolLoader = (async () => {
      const urls = [
        "https://unpkg.com/3dmol/build/3Dmol-min.js",
        "https://cdn.jsdelivr.net/npm/3dmol/build/3Dmol-min.js",
      ];
      for (const url of urls) {
        try {
          await loadExternalScript(url);
          if (window.$3Dmol) return true;
        } catch (_) {}
      }
      return Boolean(window.$3Dmol);
    })();
  }
  return await threeDmolLoader;
}
async function ensureViewersReady() {
  const ok = await ensure3DmolLoaded();
  if (ok && vLeft.__viewerStub) {
    vLeft = makeViewer("viewer_left");
    vRight = makeViewer("viewer_right");
  }
  if (!ok) {
    const msg = viewerUnavailableMessage();
    setViewerNotice("left", msg, "error");
    setViewerNotice("right", msg, "error");
  }
  return ok;
}
function getApiBase() {
  return (document.getElementById("api_base").value || "").trim().replace(/\/+$/, "");
}
function appendNoCache(url) {
  return url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
}
function buildApiCandidates() {
  const userBase = getApiBase();
  const h = window.location.hostname || "127.0.0.1";
  const cands = [];
  if (userBase) cands.push(userBase);
  cands.push(`http://${h}:8015`, `http://${h}:8021`, `http://${h}:8019`, `http://${h}:8018`, `http://${h}:8017`, `http://${h}:8016`);
  cands.push("http://127.0.0.1:8015", "http://127.0.0.1:8021", "http://127.0.0.1:8019", "http://127.0.0.1:8018", "http://127.0.0.1:8017", "http://127.0.0.1:8016");
  return [...new Set(cands.filter(Boolean))];
}
async function detectApiBase() {
  if (localApiBase) return localApiBase;
  for (const b of buildApiCandidates()) {
    try {
      const j = await fetchJsonRaw(b + "/api/diffdock/ping");
      if (j && j.ok) {
        localApiBase = b;
        document.getElementById("api_base").value = b;
        return localApiBase;
      }
    } catch (_) {}
  }
  return "";
}
function normalizeDataRelPath(ref) {
  const s = String(ref || "").trim();
  if (!s) return "";
  const directPrefixes = ["../backend/data/", "./backend/data/", "/backend/data/", "backend/data/"];
  for (const p of directPrefixes) {
    if (s.startsWith(p)) return s.slice(p.length);
  }
  if (s.startsWith("structures/") || s.startsWith("diffdock/") || s.startsWith("ligands/") || s.startsWith("pockets/")) return s;
  if (s === "data.json" || s === "diffdock_index.json" || s === "master_full.json") return s;
  if (s.startsWith("/root/PDB_ZN/diffdock_inputs/receptors/")) {
    return "structures/" + s.split("/").pop();
  }
  if (s.startsWith("/root/PDB_ZN/diffdock_outputs/")) {
    const parts = s.split("/").filter(Boolean);
    const fname = parts[parts.length - 1] || "";
    const pid = parts[parts.length - 2] || "";
    if (pid && fname) return `diffdock/${pid}/${fname}`;
  }
  return "";
}
function resolveDataUrl(ref) {
  const rel = normalizeDataRelPath(ref);
  if (!rel) return String(ref || "").trim();
  if (localApiBase && localDataViaApi) {
    return `${localApiBase}/api/data/file?path=${encodeURIComponent(rel)}`;
  }
  return `../backend/data/${rel}`;
}
function dataUrlCandidates(relPath) {
  const out = [];
  if (localApiBase) out.push(`${localApiBase}/api/data/file?path=${encodeURIComponent(relPath)}`);
  out.push(`../backend/data/${relPath}`);
  return [...new Set(out)];
}
async function fetchFirstJson(urls) {
  let lastErr = null;
  for (const u of urls) {
    try {
      return {json: await fetchJson(u), url: u};
    } catch (e) {
      lastErr = e;
    }
  }
  throw lastErr || new Error("数据加载失败");
}
function getPoseMeta(pid, poseFile) {
  const entry = getEntryById(pid);
  return (entry && entry.poses ? entry.poses : []).find(p => p.file === poseFile) || null;
}
function setOnlineInfo(t) {
  document.getElementById("online_job_info").textContent = t;
}
function readFileText(file) {
  return new Promise((resolve, reject)=>{
    const fr = new FileReader();
    fr.onload = () => resolve(String(fr.result || ""));
    fr.onerror = () => reject(new Error("文件读取失败: " + (file && file.name ? file.name : "")));
    fr.readAsText(file);
  });
}
function dist3(a, b) {
  const dx = a.x - b.x;
  const dy = a.y - b.y;
  const dz = a.z - b.z;
  return Math.sqrt(dx * dx + dy * dy + dz * dz);
}
function parsePdbAtoms(text) {
  const out = [];
  const lines = (text || "").split(/\r?\n/);
  for (const line of lines) {
    if (!(line.startsWith("ATOM") || line.startsWith("HETATM"))) continue;
    const atom = line.slice(12,16).trim();
    const resn = line.slice(17,20).trim();
    const chain = line.slice(21,22).trim();
    const resiStr = line.slice(22,26).trim();
    const x = Number(line.slice(30,38).trim());
    const y = Number(line.slice(38,46).trim());
    const z = Number(line.slice(46,54).trim());
    const elemRaw = line.length >= 78 ? line.slice(76,78).trim() : "";
    const elem = (elemRaw || atom.replace(/[0-9]/g, "").slice(0,2)).toUpperCase();
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    out.push({atom, resn, chain, resi: resiStr, x, y, z, elem});
  }
  return out;
}
function parseSdfAtoms(text) {
  const lines = (text || "").split(/\r?\n/);
  if (lines.length < 4) return [];
  const nAtoms = parseInt((lines[3] || "").slice(0,3).trim(), 10);
  if (!Number.isFinite(nAtoms) || nAtoms <= 0) return [];
  const atoms = [];
  for (let i = 4; i < 4 + nAtoms && i < lines.length; i++) {
    const line = lines[i];
    const x = Number(line.slice(0,10).trim());
    const y = Number(line.slice(10,20).trim());
    const z = Number(line.slice(20,30).trim());
    const elem = line.slice(31,34).trim().toUpperCase();
    if (!Number.isFinite(x) || !Number.isFinite(y) || !Number.isFinite(z)) continue;
    atoms.push({x, y, z, elem});
  }
  return atoms;
}
async function fetchText(url) {
  const r = await fetch(appendNoCache(url));
  if (!r.ok) throw new Error(url + "加载失败");
  return await r.text();
}
function findHisCoordinatedZn(atoms) {
  const znAtoms = atoms.filter(a => a.elem === "ZN" || (a.atom || "").toUpperCase() === "ZN");
  if (!znAtoms.length) return null;
  let best3 = null;
  let bestAny = null;
  for (const zn of znAtoms) {
    const hisSet = new Set();
    for (const a of atoms) {
      if (a.resn !== "HIS") continue;
      if (dist3(zn, a) <= 3.0) hisSet.add(`${a.chain}:${a.resi}`);
    }
    const hit = {zn, hisCount: hisSet.size};
    if (!bestAny || hit.hisCount > bestAny.hisCount) bestAny = hit;
    if (hit.hisCount >= 3 && (!best3 || hit.hisCount > best3.hisCount)) best3 = hit;
  }
  return best3 || bestAny;
}
async function getReceptorInfo(pid) {
  if (receptorInfoCache.has(pid)) return receptorInfoCache.get(pid);
  const cands = structureCandidates(pid);
  let text = "";
  let used = "";
  for (const c of cands) {
    if (c.toLowerCase().endsWith(".cif")) continue;
    try {
      text = await fetchText(c);
      used = c;
      break;
    } catch (_) {}
  }
  const atoms = parsePdbAtoms(text);
  const znInfo = findHisCoordinatedZn(atoms);
  const info = {atoms, znInfo, source: used};
  receptorInfoCache.set(pid, info);
  return info;
}
async function computeZnDistanceRanking(pid, topN) {
  const entry = getEntryById(pid);
  if (!entry) return [];
  const receptor = await getReceptorInfo(pid);
  const zn = receptor && receptor.znInfo ? receptor.znInfo.zn : null;
  const poses = (entry.poses || []).filter(p => p.rank != null).sort((a,b)=>a.rank-b.rank).slice(0, topN);
  const rows = [];
  for (const p of poses) {
    let d = Number.POSITIVE_INFINITY;
    try {
      const sdf = await fetchText(p.file);
      const ligAtoms = parseSdfAtoms(sdf).filter(a => a.elem !== "H");
      if (zn && ligAtoms.length) {
        for (const a of ligAtoms) {
          const dd = dist3(a, zn);
          if (dd < d) d = dd;
        }
      }
    } catch (_) {}
    rows.push({...p, zn_distance: Number.isFinite(d) ? d : null, his_count: receptor && receptor.znInfo ? receptor.znInfo.hisCount : 0});
  }
  rows.sort((a,b)=>{
    const da = a.zn_distance == null ? Number.POSITIVE_INFINITY : a.zn_distance;
    const db = b.zn_distance == null ? Number.POSITIVE_INFINITY : b.zn_distance;
    return da - db;
  });
  return rows;
}
function renderRankList(side, rows) {
  const box = document.getElementById(side === "left" ? "left_rank_list" : "right_rank_list");
  box.innerHTML = "";
  if (!rows.length) {
    box.textContent = "无可用排序数据";
    return;
  }
  for (const r of rows) {
    const div = document.createElement("div");
    div.className = "rank_row";
    const d = r.zn_distance == null ? "NA" : r.zn_distance.toFixed(2) + " Å";
    div.innerHTML = `<span>rank${r.rank}</span><span>${d}</span>`;
    div.title = `confidence: ${r.confidence ?? "NA"}, HIS数: ${r.his_count}`;
    div.addEventListener("click", ()=>{
      const poseSel = document.getElementById(side === "left" ? "pose_left" : "pose_right");
      poseSel.value = r.file;
      loadCompare();
    });
    box.appendChild(div);
  }
}
async function refreshRankForSide(side) {
  const pid = document.getElementById(side === "left" ? "pdb_left" : "pdb_right").value;
  if (!pid) {
    renderRankList(side, []);
    return [];
  }
  const rows = await computeZnDistanceRanking(pid, 10);
  renderRankList(side, rows);
  return rows;
}
async function applyAutoTop2FromLeft() {
  if (autoApplyingTop2) return;
  autoApplyingTop2 = true;
  try {
    const leftPid = document.getElementById("pdb_left").value;
    if (!leftPid) return;
    const rows = await refreshRankForSide("left");
    if (!rows.length) return;
    const leftPoseSel = document.getElementById("pose_left");
    const rightPoseSel = document.getElementById("pose_right");
    const rightPdbSel = document.getElementById("pdb_right");
    rightPdbSel.value = leftPid;
    renderPoseOptions("right");
    leftPoseSel.value = rows[0].file;
    rightPoseSel.value = rows.length > 1 ? rows[1].file : rows[0].file;
    await refreshRankForSide("right");
    loadCompare();
  } finally {
    autoApplyingTop2 = false;
  }
}
function getViewerState(viewer) {
  if (!viewerStates.has(viewer)) {
    viewerStates.set(viewer, {ligModel:null, ligColor:"cyanCarbon", pickedLabel:null, nearLabels:[], lastSel:null, measurePoints:[], measureShapes:[], measureLabels:[]});
  }
  return viewerStates.get(viewer);
}
function atomName(a) {
  return `${a.chain || ""}:${a.resn || ""}${a.resi || ""}:${a.atom || a.elem || ""}`;
}
function offsetLabelPos(a, ref) {
  const r = ref || {x:a.x, y:a.y - 1, z:a.z};
  let vx = a.x - r.x;
  let vy = a.y - r.y;
  let vz = a.z - r.z;
  const n = Math.sqrt(vx*vx + vy*vy + vz*vz);
  if (n < 1e-6) {
    vx = 0;
    vy = 1;
    vz = 0;
  } else {
    vx /= n;
    vy /= n;
    vz /= n;
  }
  return {x:a.x + vx * 1.0, y:a.y + vy * 1.0, z:a.z + vz * 1.0};
}
function clearMeasurementForViewer(viewer, state) {

function handleMeasureClick(viewer, state, atom, sideText) {

    const a = state.measurePoints[0];
    const b = state.measurePoints[1];
    const d = dist3(a, b);
    if (viewer.addLine) {
      state.measureShapes.push(viewer.addLine({start:{x:a.x,y:a.y,z:a.z}, end:{x:b.x,y:b.y,z:b.z}, color:"red", linewidth:3}));
    }
    if (viewer.addLabel) {
      state.measureLabels.push(viewer.addLabel(`d=${d.toFixed(2)} Å`, {
        position:{x:(a.x+b.x)/2, y:(a.y+b.y)/2, z:(a.z+b.z)/2},
        backgroundColor:"red",
        fontColor:"white",
        inFront:true
      }));
    }
    setStatus(`${sideText}键长：${atomName(a)} ↔ ${atomName(b)} = ${d.toFixed(2)} Å`);
  } else if (state.measurePoints.length === 3) {
    const a = state.measurePoints[0];
    const b = state.measurePoints[1];
    const c = state.measurePoints[2];
    const v1 = {x:a.x-b.x, y:a.y-b.y, z:a.z-b.z};
    const v2 = {x:c.x-b.x, y:c.y-b.y, z:c.z-b.z};
    const n1 = Math.sqrt(v1.x*v1.x+v1.y*v1.y+v1.z*v1.z);
    const n2 = Math.sqrt(v2.x*v2.x+v2.y*v2.y+v2.z*v2.z);
    const cosv = (v1.x*v2.x+v1.y*v2.y+v1.z*v2.z) / Math.max(1e-8, n1*n2);
    const ang = Math.acos(Math.max(-1, Math.min(1, cosv))) * 180 / Math.PI;
    if (viewer.addLine) {
      state.measureShapes.push(viewer.addLine({start:{x:b.x,y:b.y,z:b.z}, end:{x:a.x,y:a.y,z:a.z}, color:"purple", linewidth:3}));
      state.measureShapes.push(viewer.addLine({start:{x:b.x,y:b.y,z:b.z}, end:{x:c.x,y:c.y,z:c.z}, color:"purple", linewidth:3}));
    }
    if (viewer.addLabel) {
      state.measureLabels.push(viewer.addLabel(`∠=${ang.toFixed(1)}°`, {
        position:{x:b.x,y:b.y,z:b.z},
        backgroundColor:"purple",
        fontColor:"white",
        inFront:true
      }));
    }

    const prev = resMap.get(key);
    if (!prev || a.atom === "CA") resMap.set(key, a);
  }
  for (const a of resMap.values()) {
    const lb = viewer.addLabel(`${a.chain || ""}:${a.resn || ""}${a.resi || ""}`, {
      position: offsetLabelPos(a),
      backgroundColor: "rgba(255,255,255,0.92)",

  }

    const nearSel = isZn
      ? {within:{distance:5.0, sel:(atom.serial != null ? {serial:atom.serial} : {elem:"ZN"})}, byres:true}
      : {within:{distance:5.0, sel:{chain: atom.chain, resi: atom.resi}}, byres:true};
    viewer.setStyle(nearSel, {stick:{colorscheme:"whiteCarbon", radius:0.18}});
    if (!isZn) viewer.setStyle({chain: atom.chain, resi: atom.resi}, {stick:{color:"orange", radius:0.22}});
    viewer.setStyle({elem:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
    viewer.setStyle({atom:"ZN"}, {sphere:{radius:1.0, color:"magenta"}, stick:{radius:0.2, color:"magenta"}});
    clearViewerLabels(viewer, state);
    labelResiduesInSelection(viewer, state, nearSel);
    state.lastSel = nearSel;
    if (viewer.addLabel) {
      const pickedText = isZn ? "ZN" : `${atom.chain || ""}:${atom.resn || ""}${atom.resi || ""}`;
      state.pickedLabel = viewer.addLabel(pickedText, {
        position: {x:atom.x, y:atom.y, z:atom.z},
        backgroundColor: "black",
        fontColor: "white",
        fontSize: 15,
        inFront: true
      });
    }
    viewer.zoomTo(nearSel);
    viewer.render();
    setStatus(isZn ? "已定位 ZN 的5Å邻域" : `已定位 ${atom.chain || ""}:${atom.resn || ""}${atom.resi || ""} 的5Å邻域`);
  });
}

function structureCandidates(id) {
  const m = getMasterItem(id) || {};
  const cands = [];
  for (const ref of [m.receptor_rel, m.receptor_pdb, `structures/${id}.pdb`, `structures/${id}.cif`]) {
    const resolved = resolveDataUrl(ref);
    if (resolved) cands.push(resolved);

async function tryLoadModel(viewer, candidates, fmts) {
  const errors = [];
  for (let i = 0; i < candidates.length; i++) {
    const u = candidates[i];
    try {
      const r = await fetch(u + "?t=" + Date.now());
      if (!r.ok) {
        errors.push(`${u} -> http_${r.status}`);
        continue;
      }
      const txt = await r.text();
      viewer.addModel(txt, fmts[i]);
      return {url: u, errors};
    } catch (e) {
      errors.push(`${u} -> ${(e && e.message) || "load_failed"}`);
    }
  }
  return {url: "", errors};
}

  const cands = structureCandidates(id);
  const fmts = cands.map(x => x.toLowerCase().endsWith(".cif") ? "cif" : "pdb");
  const loadedRec = await tryLoadModel(viewer, cands, fmts);
  if (!loadedRec.url) throw new Error("受体结构未找到: " + id + (loadedRec.errors.length ? "；尝试: " + loadedRec.errors.join(" | ") : ""));
  const r = await fetch(poseFile + "?t=" + Date.now());

  const sdf = await r.text();
  const lig = viewer.addModel(sdf, "sdf");
  state.ligModel = lig;
  state.ligColor = ligandColor;
  applyPanelBase(viewer, state);
  lig.setStyle({}, {stick:{colorscheme:ligandColor, radius:0.24}});
  bindViewerClick(viewer);
  state.lastSel = {within:{distance:5.0, sel:{elem:"ZN"}}, byres:true};
  if (residueLabelMode) {
    labelResiduesInSelection(viewer, state, state.lastSel);

  }

async function pollOnlineJob(opts = {}) {
  const apiBase = getApiBase();
  if (!apiBase || !onlineJobId) {
    setStatus("请先提交在线任务");
    return;
  }
  try {
    const r = await fetch(apiBase + "/api/diffdock/status/" + encodeURIComponent(onlineJobId));
    const j = await r.json();
    if (!r.ok || !j.ok) throw new Error(j.error || "status failed");
    const job = j.job || {};
    updateOnlineProgressFromJob(job);
    setOnlineInfo(`任务 ${job.id}：${job.status}${job.error ? " | " + job.error : ""}`);
    if (job.status === "done" && Array.isArray(job.poses) && job.poses.length) {
      stopOnlinePolling();
      const receptorFile = (document.getElementById("online_receptor_file").files || [])[0];
      if (!receptorFile) throw new Error("缺少受体文件");
      const receptorText = await readFileText(receptorFile);
      const receptorFmt = receptorFile.name.toLowerCase().endsWith(".cif") ? "cif" : "pdb";
      onlineResult = {
        apiBase,
        receptor: {name: receptorFile.name, text: receptorText, fmt: receptorFmt},
        poses: job.poses
      };
      renderOnlinePoses();
      setStatus(`在线任务完成，pose数量 ${job.poses.length}`);
      setOnlineProgress(100, "在线任务完成");
    } else if (job.status === "failed") {
      stopOnlinePolling();
      setOnlineProgress(100, `在线任务失败 (${job.phase || job.status})`, "error");
      setStatus(`在线任务失败：${job.error || job.status || "unknown"}`);
    } else {
      if (!opts.silent) setStatus(`在线任务状态：${job.status}${job.phase ? " / " + job.phase : ""}`);
    }
  } catch (e) {
    if (!opts.silent) setOnlineProgress(100, "在线状态查询失败", "error");
    setStatus("查询在线任务失败：" + (e && e.message ? e.message : "unknown"));
  }
}

  const pv = pl.value; pl.value = pr.value; pr.value = pv;
  const l = document.getElementById("pose_left");
  const r = document.getElementById("pose_right");
  const t = l.value; l.value = r.value; r.value = t;
  renderPoseOptions("left");
  renderPoseOptions("right");
  loadCompare();
});
document.getElementById("load_btn").addEventListener("click", loadCompare);
document.getElementById("online_submit_btn").addEventListener("click", submitOnlineJob);
document.getElementById("online_poll_btn").addEventListener("click", pollOnlineJob);
document.getElementById("online_load_btn").addEventListener("click", loadCompareOnline);
document.getElementById("auto_top2_btn").addEventListener("click", applyAutoTop2FromLeft);
document.getElementById("measure_mode_btn").addEventListener("click", ()=>{
  measureMode = !measureMode;
  document.getElementById("measure_mode_btn").textContent = "测量模式：" + (measureMode ? "开" : "关");
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    state.measurePoints = [];
  }
  setStatus(measureMode ? "测量模式已开启：每个窗口点击2点测键长，连续点击3点测键角" : "测量模式已关闭");
});
document.getElementById("measure_clear_btn").addEventListener("click", ()=>{
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    clearMeasurementForViewer(viewer, state);
    if (viewer.render) viewer.render();
  }
  setStatus("测量结果已清空");
});
document.getElementById("res_label_btn").addEventListener("click", ()=>{
  residueLabelMode = !residueLabelMode;
  document.getElementById("res_label_btn").textContent = "残基标签：" + (residueLabelMode ? "开" : "关");
  for (const viewer of [vLeft, vRight]) {
    const state = getViewerState(viewer);
    if (residueLabelMode) {
      if (state.lastSel) labelResiduesInSelection(viewer, state, state.lastSel);
    } else {
      clearViewerLabels(viewer, state);
    }
    if (viewer.render) viewer.render();
  }
  setStatus(residueLabelMode ? "已开启残基标签，可点击残基或ZN查看5Å邻域标签" : "已关闭残基标签");
});
window.addEventListener("load", async ()=>{
  try {
    resetOnlineProgress("等待提交");
    await ensureViewersReady();
    await initData();
    renderPoseOptions("left");
    renderPoseOptions("right");
    await applyAutoTop2FromLeft();
    await refreshRankForSide("right");
    loadCompare();
  } catch (e) {
    setStatus("初始化失败：" + (e && e.message ? e.message : "unknown"));
  }
  if (!window.$3Dmol) {
    setStatus((document.getElementById("status").textContent || "状态未知") + " | " + viewerUnavailableMessage());
  }
});
</script>
</body>
</html>
